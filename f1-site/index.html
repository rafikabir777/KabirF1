  document.getElementById('cardContent').innerHTML=`<div class="card-loading"><div class="card-loading-ring"></div><div class="card-loading-text">Loading ${driverName}…</div></div>`;
  openModal();
  try{
    const[sR,rR,dR]=await Promise.allSettled([
      fetchJ(`${API}/current/drivers/${driverId}/driverStandings/?format=json`),
      fetchJ(`${API}/current/drivers/${driverId}/results/?format=json&limit=100`),
      fetchJ(`${API}/drivers/${driverId}/?format=json`)
    ]);
    const st=sR.status==='fulfilled'?sR.value?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings?.[0]:null;
    const rc=rR.status==='fulfilled'?rR.value?.MRData?.RaceTable?.Races||[]:[];
    const inf=dR.status==='fulfilled'?dR.value?.MRData?.DriverTable?.Drivers?.[0]:null;
    const pts=st?.points||'0',pos=st?.position||'—',wins=st?.wins||'0';
    let pod=0,dnf=0,best=99,tpos=0;const hist=[];
    rc.forEach(r=>{const res=r.Results?.[0];if(!res)return;const p=parseInt(res.position);if(p<=3)pod++;if(!isFinished(res.status))dnf++;if(p<best)best=p;tpos+=p;hist.push(p);});
    const num=inf?.permanentNumber||'',nat=inf?.nationality||'',dob=inf?.dateOfBirth?new Date(inf.dateOfBirth).getFullYear():'';
    const maxP=25*Math.max(rc.length,1),pct=Math.min(100,(parseFloat(pts)/maxP*100)).toFixed(1);
    const sparks=hist.slice(-10).map(p=>{const h=Math.max(4,Math.round((1-(p-1)/19)*44));const col=p===1?'var(--gold)':p<=3?color:p>15?'rgba(225,6,0,.5)':'rgba(255,255,255,.2)';return`<div class="spark-bar" style="width:8px;height:${h}px;background:${col}"></div>`;}).join('');
    document.getElementById('cardContent').innerHTML=`
      <div class="card-header"><div class="card-num" style="color:${color}">${num}</div>
      <div><div class="card-fullname">${driverName}</div>
      <div class="card-meta"><span class="card-team-pill" style="border-color:${color}55;color:${color}">${constructorName}</span><span class="card-nat">🌍 ${nat}${dob?' · b. '+dob:''}</span></div></div></div>
      <div class="card-stats">
        <div class="stat-box"><div class="stat-val" style="color:${color}">${pos}</div><div class="stat-lbl">Position</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--gold)">${pts}</div><div class="stat-lbl">Points</div></div>
        <div class="stat-box"><div class="stat-val">${wins}</div><div class="stat-lbl">Wins</div></div>
        <div class="stat-box"><div class="stat-val">${pod}</div><div class="stat-lbl">Podiums</div></div>
        <div class="stat-box"><div class="stat-val">${best<99?best:'—'}</div><div class="stat-lbl">Best Finish</div></div>
        <div class="stat-box"><div class="stat-val" style="color:rgba(225,6,0,.9)">${dnf}</div><div class="stat-lbl">DNFs</div></div>
      </div>
      <div class="pts-bar-section"><div class="pts-bar-head"><span>Points Progress</span><span>${pts} pts this season</span></div>
      <div class="pts-track"><div class="pts-fill" id="ptsBar" style="width:0%;background:${color}"></div></div></div>
      ${hist.length?`<div class="spark-row"><div class="spark-head"><span>Recent Finishes</span><span>last ${Math.min(10,hist.length)} races · lower = better</span></div><div class="spark-bars">${sparks}</div></div>`:''}`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{const b=document.getElementById('ptsBar');if(b)b.style.width=pct+'%';}));
  }catch(e){
    document.getElementById('cardContent').innerHTML=`<div style="text-align:center;padding:36px 0;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;font-size:12px">Could not load driver data.<br><small style="opacity:.35;margin-top:6px;display:block">${e.message}</small></div>`;
  }
}




/* ═══════════════════════════════════════════════════
   TEAMMATE GAPS — Qualifying & Fastest Race Lap
═══════════════════════════════════════════════════ */
let _tgMode = 'quali'; // 'quali' | 'race'

function lapMsec(t){
  // Convert M:SS.mmm or SS.mmm string to milliseconds
  if(!t || t==='\\N' || t==='N') return null;
  const s = String(t).trim();
  const p = s.split(':');
  if(p.length === 2) return Math.round((parseFloat(p[0])*60 + parseFloat(p[1])) * 1000);
  const n = parseFloat(s);
  return isNaN(n) ? null : Math.round(n * 1000);
}

function msecToStr(ms){
  if(ms===null) return '—';
  const total = ms/1000;
  const m = Math.floor(total/60);
  const s = (total%60).toFixed(3).padStart(6,'0');
  return m ? m+':'+s : s;
}

function gapStr(ms){
  if(ms===null||ms===0) return '=';
  const s = Math.abs(ms)/1000;
  return (ms<0?'-':'+')+s.toFixed(3)+'s';
}

async function renderTeammateGaps(race){
  const el = document.getElementById('tmgapsContainer');
  if(!el) return;
  el.innerHTML = `<div class="pace-loading"><div class="loading-ring"></div><div class="loading-text">Loading qualifying & lap data…</div></div>`;

  // Try the current race round first, then fall back through previous rounds
  // until we find one with both quali and race results.
  const startRound = race ? parseInt(race.round) : 1;

  for(let round = startRound; round >= 1; round--){
    try{
      const [qualiRes, resultsRes] = await Promise.allSettled([
        fetchJ(`${API}/current/${round}/qualifying/?format=json&limit=30`),
        fetchJ(`${API}/current/${round}/results/?format=json&limit=30`)
      ]);

      const qualiResults = qualiRes.status==='fulfilled'
        ? qualiRes.value?.MRData?.RaceTable?.Races?.[0]?.QualifyingResults||[] : [];
      const raceResults = resultsRes.status==='fulfilled'
        ? resultsRes.value?.MRData?.RaceTable?.Races?.[0]?.Results||[] : [];
      const raceMeta = resultsRes.status==='fulfilled'
        ? resultsRes.value?.MRData?.RaceTable?.Races?.[0] : null;

      // Need at least race results to proceed
      if(!raceResults.length) continue;

      // Update label with actual round found
      const label = document.getElementById('tgRaceLabel');
      if(label) label.textContent = `Round ${round} · ${raceMeta?.raceName||''}`;

      // Build teams map
      const teams = {};
      raceResults.forEach(r => {
        const cid = r.Constructor?.constructorId;
        if(!teams[cid]) teams[cid] = {
          name: r.Constructor?.name||cid,
          color: teamColor(cid),
          drivers: []
        };
        const qr = qualiResults.find(q => q.Driver?.driverId === r.Driver?.driverId);
        const bestQuali = lapMsec(qr?.Q3) || lapMsec(qr?.Q2) || lapMsec(qr?.Q1);
        const fastestRace = r.FastestLap ? lapMsec(r.FastestLap.Time?.time) : null;
        teams[cid].drivers.push({
          name: r.Driver?.code || fn(r.Driver).split(' ').pop(),
          fullName: fn(r.Driver),
          driverId: r.Driver?.driverId,
          bestQuali,
          fastestRace,
          fastestLapRank: parseInt(r.FastestLap?.rank)||99,
          qualiStr: qr ? (qr.Q3||qr.Q2||qr.Q1||'—') : '—',
          raceStr: r.FastestLap?.Time?.time||'—'
        });
      });

      const teamList = Object.values(teams)
        .filter(t => t.drivers.length >= 2)
        .sort((a,b)=>{
          const bA = Math.min(...a.drivers.map(d=>d.bestQuali||999999));
          const bB = Math.min(...b.drivers.map(d=>d.bestQuali||999999));
          return bA - bB;
        });

      if(!teamList.length) continue; // try previous round

      window._tgTeams = teamList;
      buildTeammateGapsUI(teamList);
      return; // success — stop looping

    }catch(e){ continue; }
  }

  // If we get here nothing worked
  el.innerHTML = `<div class="pace-err">No data available yet for the 2026 season</div>`;
}

function buildTeammateGapsUI(teamList){
  const el = document.getElementById('tmgapsContainer');
  if(!el) return;
  const mode = _tgMode;

  const teamsHtml = teamList.map(team => {
    const [d1, d2] = team.drivers.sort((a,b) => {
      if(mode==='quali'){
        const t1 = a.bestQuali||999999, t2 = b.bestQuali||999999;
        return t1 - t2;
      } else {
        return (a.fastestLapRank||99) - (b.fastestLapRank||99);
      }
    });

    const t1ms = mode==='quali' ? d1.bestQuali : d1.fastestRace;
    const t2ms = mode==='quali' ? d2.bestQuali : d2.fastestRace;
    const t1str = mode==='quali' ? d1.qualiStr : d1.raceStr;
    const t2str = mode==='quali' ? d2.qualiStr : d2.raceStr;

    const hasData = t1ms && t2ms;
    const gapMs = hasData ? t2ms - t1ms : null;  // positive = d1 faster
    const gapLabel = hasData ? gapStr(gapMs) : '—';
    const pctGap = hasData ? Math.min(Math.abs(gapMs)/t1ms*100*8, 50) : 0; // scale for bar

    const winnerD1 = hasData && gapMs >= 0;

    return `<div class="tg-team-block">
      <div class="tg-team-header">
        <div class="tg-team-bar" style="background:${team.color}"></div>
        <div class="tg-team-name">${team.name}</div>
        <div class="tg-team-sub">${mode==='quali'?'Best Qualifying Time':'Fastest Race Lap'}</div>
      </div>

      <div class="tg-row">
        <!-- Driver 1 (faster) -->
        <div class="tg-driver">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="tg-driver-name">${d1.name}</span>
            ${winnerD1?`<span class="tg-winner-badge" style="background:${team.color}22;border:1px solid ${team.color}55;color:${team.color}">✓ Faster</span>`:''}
          </div>
          <div class="tg-driver-time" style="color:${team.color}">${t1str}</div>
        </div>

        <!-- Gap center -->
        <div class="tg-gap-center">
          <div class="tg-gap-pill">${gapLabel}</div>
          <div style="width:100%;min-width:80px">
            <div class="tg-bar-track" style="margin-top:6px">
              <div class="tg-bar-l" style="width:${winnerD1?pctGap:0}%;background:${team.color}"></div>
              <div class="tg-bar-r" style="width:${!winnerD1?pctGap:0}%;background:${team.color}66"></div>
            </div>
          </div>
          <div class="tg-gap-label">${mode==='quali'?'Qualifying Gap':'Race Lap Gap'}</div>
        </div>

        <!-- Driver 2 (slower) -->
        <div class="tg-driver tg-driver-right">
          <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
            ${!winnerD1?`<span class="tg-winner-badge" style="background:${team.color}22;border:1px solid ${team.color}55;color:${team.color}">✓ Faster</span>`:''}
            <span class="tg-driver-name">${d2.name}</span>
          </div>
          <div class="tg-driver-time" style="color:${team.color}88;text-align:right">${t2str||'—'}</div>
        </div>
      </div>

      ${!hasData?`<div class="tg-nodata">No ${mode==='quali'?'qualifying':'fastest lap'} data for one or both drivers</div>`:''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="tg-section-toggle">
      <button class="tg-toggle-btn ${_tgMode==='quali'?'on':''}" onclick="switchTgMode('quali')">🕐 Qualifying</button>
      <button class="tg-toggle-btn ${_tgMode==='race'?'on':''}" onclick="switchTgMode('race')">🏎 Fastest Race Lap</button>
    </div>
    <div class="tg-section">${teamsHtml}</div>`;
}

function switchTgMode(mode){
  _tgMode = mode;
  if(window._tgTeams) buildTeammateGapsUI(window._tgTeams);
}

/* ═══════════════════════════════════════════════════
   PIT STOP STRATEGY TIMELINE
═══════════════════════════════════════════════════ */
const COMPOUND_COLORS={soft:'#e8002d',medium:'#ffd700',hard:'#e0e0e0',intermediate:'#39b54a',wet:'#0067ff',unknown:'#888'};

async function renderPitStops(race){
  const el=document.getElementById('pitContainer');
  if(!el||!race)return;
  const label=document.getElementById('pitRaceLabel');
  if(label)label.textContent=`Round ${race.round} · ${race.Circuit?.Location?.country||''}`;
  const totalLaps=parseInt(race.laps)||60;
  const results=race.Results||[];

  try{
    const [pitsData,lapsData]=await Promise.allSettled([
      fetchJ(`${API}/current/${race.round}/pitstops/?format=json&limit=200`),
      fetchJ(`${API}/current/${race.round}/laps/1/?format=json`)
    ]);

    const pits=pitsData.status==='fulfilled'
      ?pitsData.value?.MRData?.RaceTable?.Races?.[0]?.PitStops||[]:[];

    if(!pits.length){
      el.innerHTML=`<div class="pace-err">No pit stop data available for this race yet</div>`;
      return;
    }

    // Group pits by driver
    const byDriver={};
    pits.forEach(p=>{
      if(!byDriver[p.driverId])byDriver[p.driverId]=[];
      byDriver[p.driverId].push({lap:parseInt(p.lap),dur:p.duration,stop:parseInt(p.stop)});
    });

    // Sort drivers by finish position
    const driverOrder=results.map(r=>r.Driver?.driverId).filter(id=>byDriver[id]);

    // Build stint segments per driver
    // Stints: lap 1 → first pit, first pit → second pit, ..., last pit → end
    // Assign compound colours cycling soft→medium→hard (we don't have tyre data from Ergast)
    const compoundCycle=['soft','medium','hard','medium','soft'];

    const rows=driverOrder.map(id=>{
      const pitsArr=byDriver[id].sort((a,b)=>a.lap-b.lap);
      const meta=results.find(r=>r.Driver?.driverId===id);
      const name=meta?.Driver?.code||id.slice(0,3).toUpperCase();
      const color=teamColor(meta?.Constructor?.constructorId||'');
      const finishLap=parseInt(meta?.laps)||totalLaps;

      const stintEnds=[...pitsArr.map(p=>p.lap-1),finishLap];
      const stintStarts=[1,...pitsArr.map(p=>p.lap)];
      const stints=stintStarts.map((s,i)=>({
        start:s, end:stintEnds[i]||finishLap,
        compound:compoundCycle[i%compoundCycle.length]
      }));

      return{id,name,color,stints,pits:pitsArr,finishLap};
    });

    const compoundsUsed=[...new Set(rows.flatMap(r=>r.stints.map(s=>s.compound)))];

    el.innerHTML=`<div class="pit-section">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:16px">
        Each bar = one stint. Markers = pit stops. Compound colours are estimated (Ergast doesn't provide tyre data).
      </div>
      <div class="pit-timeline">
        ${rows.map(row=>{
          const stintHtml=row.stints.map(s=>{
            const left=((s.start-1)/totalLaps*100).toFixed(2);
            const width=((s.end-s.start+1)/totalLaps*100).toFixed(2);
            const bg=COMPOUND_COLORS[s.compound]||'#888';
            const laps=s.end-s.start+1;
            return`<div class="pit-stint" style="left:${left}%;width:${width}%;background:${bg}22;border:1px solid ${bg}66;" title="${s.compound} · laps ${s.start}–${s.end} (${laps} laps)">
              <span style="color:${bg};font-size:8px">${laps>4?laps+' L':''}</span>
            </div>`;
          }).join('');
          const pitMarkers=row.pits.map(p=>{
            const left=((p.lap-1)/totalLaps*100).toFixed(2);
            return`<div class="pit-stop-marker" style="left:calc(${left}% - 1px)" title="Pit lap ${p.lap} · ${p.dur}s"></div>`;
          }).join('');
          return`<div class="pit-row">
            <div class="pit-driver-label" style="color:${row.color}">${row.name}</div>
            <div class="pit-track">${stintHtml}${pitMarkers}</div>
            <div class="pit-stop-badge">${row.pits.length} stop${row.pits.length!==1?'s':''}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="pit-lap-axis">
        ${[1,10,20,30,40,50,totalLaps].filter(n=>n<=totalLaps).map(n=>`
          <span style="position:absolute;left:calc(${((n-1)/totalLaps*100).toFixed(1)}% );transform:translateX(-50%)">${n}</span>`).join('')}
        <span style="position:absolute;right:0;color:var(--muted)">Lap</span>
      </div>
      <div class="pit-compound-legend" style="margin-top:28px">
        ${compoundsUsed.map(c=>`<div class="pit-compound-item">
          <div class="pit-compound-dot" style="background:${COMPOUND_COLORS[c]||'#888'}"></div>
          <span style="text-transform:capitalize">${c}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }catch(e){
    el.innerHTML=`<div class="pace-err">Could not load pit stop data<br><small style="opacity:.4">${e.message}</small></div>`;
  }
}

/* ═══════════════════════════════════════════════════
   GRID vs FINISH (Qualifying vs Race Positions)
═══════════════════════════════════════════════════ */
async function renderQvR(race){
  const el=document.getElementById('qvrContainer');
  if(!el||!race)return;
  const label=document.getElementById('qvrRaceLabel');
  if(label)label.textContent=`Round ${race.round} · ${race.raceName||''}`;
  const results=race.Results||[];
  if(!results.length){el.innerHTML=`<div class="pace-err">No data yet</div>`;return;}

  // Results has both grid (quali) and position (race finish)
  const drivers=results.map(r=>({
    name:r.Driver?.code||fn(r.Driver).split(' ').pop(),
    fullName:fn(r.Driver),
    grid:parseInt(r.grid)||0,
    finish:parseInt(r.position)||0,
    color:teamColor(r.Constructor?.constructorId),
    team:r.Constructor?.name||'',
    driverId:r.Driver?.driverId,
    constructorId:r.Constructor?.constructorId,
    status:r.status
  })).filter(d=>d.finish>0).sort((a,b)=>a.finish-b.finish);

  const maxPos=drivers.length;

  el.innerHTML=`<div class="qvr-section">
    <div style="display:grid;grid-template-columns:28px 44px 1fr 1fr 44px 28px;gap:8px;padding:0 10px 10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);">
      <span>Fin</span><span>Driver</span><span></span><span></span><span style="text-align:right">Grid</span><span></span>
    </div>
    <div class="qvr-grid">
    ${drivers.map(d=>{
      const delta=d.grid-d.finish; // positive = gained positions
      const deltaLabel=delta>0?'+'+delta:delta===0?'—':String(delta);
      const deltaClass=delta>0?'gain':delta<0?'loss':'same';
      const gridPct=d.grid>0?((d.grid-1)/(maxPos-1)*100):0;
      const finPct=d.finish>0?((d.finish-1)/(maxPos-1)*100):0;
      const isTop3=d.finish<=3;
      return`<div class="qvr-row">
        <div class="qvr-pos ${isTop3?'top3':''}">${d.finish}</div>
        <div class="qvr-driver-block">
          <div class="qvr-team-dot" style="background:${d.color}"></div>
          <span class="qvr-name">${d.name}</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:0 8px">
          <div style="display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted)">
            <span>Q: P${d.grid||'?'}</span>
            <div style="flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:1px;position:relative">
              <div style="position:absolute;height:2px;border-radius:1px;background:${d.color}66;left:${Math.min(finPct,gridPct).toFixed(1)}%;width:${Math.abs(gridPct-finPct).toFixed(1)}%"></div>
              <div style="position:absolute;top:-3px;left:${gridPct.toFixed(1)}%;width:8px;height:8px;border-radius:50%;background:${d.color}99;transform:translateX(-50%)"></div>
              <div style="position:absolute;top:-3px;left:${finPct.toFixed(1)}%;width:8px;height:8px;border-radius:50%;background:${d.color};transform:translateX(-50%)"></div>
            </div>
            <span>R: P${d.finish}</span>
          </div>
        </div>
        <div class="qvr-delta ${deltaClass}">${deltaLabel}</div>
      </div>`;
    }).join('')}
    </div>
    <div class="qvr-legend">
      <span><div style="width:8px;height:8px;border-radius:50%;background:var(--muted);opacity:.5;display:inline-block;margin-right:4px"></div>Qualifying pos</span>
      <span><div style="width:8px;height:8px;border-radius:50%;background:white;display:inline-block;margin-right:4px"></div>Race finish</span>
      <span style="color:#00e676">+N gained positions</span>
      <span style="color:var(--red)">−N lost positions</span>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════
   HEAD-TO-HEAD DRIVER COMPARISON
═══════════════════════════════════════════════════ */
let _h2hDriverStandings=[];

function renderH2H(dSt){
  const el=document.getElementById('h2hContainer');
  if(!el)return;
  _h2hDriverStandings=dSt;
  if(!dSt.length){el.innerHTML=`<div class="pace-err">No driver data yet</div>`;return;}

  const opts=dSt.map(d=>`<option value="${d.Driver?.driverId}">${fn(d.Driver)}</option>`).join('');

  el.innerHTML=`<div class="h2h-section">
    <div class="h2h-selectors">
      <select class="h2h-select" id="h2hA">${opts}</select>
      <div class="h2h-vs">VS</div>
      <select class="h2h-select" id="h2hB">${dSt.length>1?`<option value="${dSt[1].Driver?.driverId}">${fn(dSt[1].Driver)}</option>${dSt.filter((_,i)=>i!==1).map(d=>`<option value="${d.Driver?.driverId}">${fn(d.Driver)}</option>`).join('')}`:opts}</select>
      <button class="h2h-compare-btn" onclick="runH2H()">Compare Drivers</button>
    </div>
    <div id="h2hResult"></div>
  </div>`;
}

async function runH2H(){
  const idA=document.getElementById('h2hA')?.value;
  const idB=document.getElementById('h2hB')?.value;
  const result=document.getElementById('h2hResult');
  if(!idA||!idB||idA===idB){result.innerHTML=`<div class="pace-err">Pick two different drivers</div>`;return;}
  result.innerHTML=`<div class="pace-loading" style="padding:30px 0"><div class="loading-ring"></div><div class="loading-text">Comparing…</div></div>`;

  try{
    const [rA,rB,sA,sB]=await Promise.all([
      fetchJ(`${API}/current/drivers/${idA}/results/?format=json&limit=100`),
      fetchJ(`${API}/current/drivers/${idB}/results/?format=json&limit=100`),
      fetchJ(`${API}/current/drivers/${idA}/driverStandings/?format=json`),
      fetchJ(`${API}/current/drivers/${idB}/driverStandings/?format=json`)
    ]);

    const racesA=rA?.MRData?.RaceTable?.Races||[];
    const racesB=rB?.MRData?.RaceTable?.Races||[];
    const stA=sA?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings?.[0];
    const stB=sB?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings?.[0];

    const metaA=_h2hDriverStandings.find(d=>d.Driver?.driverId===idA);
    const metaB=_h2hDriverStandings.find(d=>d.Driver?.driverId===idB);
    const colA=teamColor(metaA?.Constructors?.[0]?.constructorId||'');
    const colB=teamColor(metaB?.Constructors?.[0]?.constructorId||'');
    const nameA=fn(metaA?.Driver)||idA;
    const nameB=fn(metaB?.Driver)||idB;
    const teamA=metaA?.Constructors?.[0]?.name||'';
    const teamB=metaB?.Constructors?.[0]?.name||'';

    function calcStats(races){
      let wins=0,pods=0,dnf=0,best=99,totalPos=0,count=0,pts=0,poleCount=0;
      races.forEach(r=>{
        const res=r.Results?.[0];if(!res)return;
        const p=parseInt(res.position);
        if(p===1)wins++;if(p<=3)pods++;
        if(!isFinished(res.status))dnf++;
        if(p<best)best=p;
        totalPos+=p;count++;
        pts+=parseFloat(res.points||0);
        if(res.grid===1||res.grid==='1')poleCount++;
      });
      return{wins,pods,dnf,best:best<99?best:'—',avg:count?+(totalPos/count).toFixed(2):0,pts,races:count,poles:poleCount};
    }

    const stsA=calcStats(racesA);
    const stsB=calcStats(racesB);

    const rows=[
      {label:'Championship Pos',vA:stA?.position||'—',vB:stB?.position||'—',numA:parseInt(stA?.position)||99,numB:parseInt(stB?.position)||99,lowerBetter:true},
      {label:'Points',vA:stA?.points||0,vB:stB?.points||0,numA:parseFloat(stA?.points||0),numB:parseFloat(stB?.points||0),lowerBetter:false},
      {label:'Wins',vA:stsA.wins,vB:stsB.wins,numA:stsA.wins,numB:stsB.wins,lowerBetter:false},
      {label:'Podiums',vA:stsA.pods,vB:stsB.pods,numA:stsA.pods,numB:stsB.pods,lowerBetter:false},
      {label:'Best Finish',vA:'P'+stsA.best,vB:'P'+stsB.best,numA:typeof stsA.best==='number'?stsA.best:99,numB:typeof stsB.best==='number'?stsB.best:99,lowerBetter:true},
      {label:'Avg Finish',vA:stsA.avg,vB:stsB.avg,numA:stsA.avg,numB:stsB.avg,lowerBetter:true},
      {label:'DNFs',vA:stsA.dnf,vB:stsB.dnf,numA:stsA.dnf,numB:stsB.dnf,lowerBetter:true},
      {label:'Races',vA:stsA.races,vB:stsB.races,numA:stsA.races,numB:stsB.races,lowerBetter:false},
    ];

    const overallA=rows.filter(r=>r.numA!==r.numB).filter(r=>r.lowerBetter?r.numA<r.numB:r.numA>r.numB).length;
    const overallB=rows.filter(r=>r.numA!==r.numB).filter(r=>r.lowerBetter?r.numB<r.numA:r.numB>r.numA).length;

    result.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:20px">
        <div class="h2h-driver-header" style="border-right:1px solid rgba(255,255,255,.06)">
          <div class="h2h-driver-name" style="color:${colA}">${nameA}${overallA>overallB?'<span class="h2h-winner-crown">👑</span>':''}</div>
          <div class="h2h-driver-team">${teamA}</div>
        </div>
        <div class="h2h-driver-header">
          <div class="h2h-driver-name" style="color:${colB}">${nameB}${overallB>overallA?'<span class="h2h-winner-crown">👑</span>':''}</div>
          <div class="h2h-driver-team">${teamB}</div>
        </div>
      </div>
      ${rows.map(row=>{
        const aWins=row.lowerBetter?row.numA<row.numB:row.numA>row.numB;
        const bWins=row.lowerBetter?row.numB<row.numA:row.numB>row.numA;
        const maxVal=Math.max(row.numA||0,row.numB||0,1);
        const pctA=(row.numA/maxVal*100).toFixed(1);
        const pctB=(row.numB/maxVal*100).toFixed(1);
        return`<div class="h2h-stat-row">
          <div style="text-align:right">
            <div class="h2h-val ${aWins?'win':'lose'}" style="${aWins?'color:'+colA:''}">${row.vA}</div>
            <div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px">
              <div class="h2h-bar-l" style="width:${pctA}%;background:${colA};height:4px;border-radius:2px;margin-left:auto"></div>
            </div>
          </div>
          <div class="h2h-label">${row.label}</div>
          <div>
            <div class="h2h-val ${bWins?'win':'lose'} h2h-val-r" style="${bWins?'color:'+colB:''}">${row.vB}</div>
            <div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px">
              <div class="h2h-bar-r" style="width:${pctB}%;background:${colB};height:4px;border-radius:2px"></div>
            </div>
          </div>
        </div>`;
      }).join('')}`;
  }catch(e){
    result.innerHTML=`<div class="pace-err">Could not load comparison data<br><small style="opacity:.4">${e.message}</small></div>`;
  }
}

/* ═══════════════════════════════════════════════════
   CHAMPIONSHIP GAP CHART
═══════════════════════════════════════════════════ */
let _champChart=null;

async function renderChampionship(dSt){
  const el=document.getElementById('champContainer');
  if(!el)return;
  if(!dSt.length){el.innerHTML=`<div class="pace-err">No standings data yet</div>`;return;}

  try{
    // Fetch all race results to build cumulative points per race
    const data=await fetchJ(`${API}/current/results/?format=json&limit=500`);
    const allRaces=data?.MRData?.RaceTable?.Races||[];

    if(allRaces.length<1){el.innerHTML=`<div class="pace-err">Not enough races completed yet</div>`;return;}

    // Build points timeline per driver
    const top10=dSt.slice(0,10);
    const driverPts={};
    top10.forEach(d=>{driverPts[d.Driver?.driverId]={name:d.Driver?.code||fn(d.Driver).split(' ').pop(),fullName:fn(d.Driver),color:teamColor(d.Constructors?.[0]?.constructorId),pts:[]};});

    const raceLabels=allRaces.map(r=>getFlag(r.Circuit?.Location?.country)+' R'+r.round);
    let cumulative={};
    top10.forEach(d=>{cumulative[d.Driver?.driverId]=0;});

    allRaces.forEach(race=>{
      (race.Results||[]).forEach(r=>{
        const id=r.Driver?.driverId;
        if(cumulative[id]!==undefined) cumulative[id]+=parseFloat(r.points||0);
      });
      top10.forEach(d=>{
        const id=d.Driver?.driverId;
        driverPts[id].pts.push(cumulative[id]||0);
      });
    });

    // Gap to leader per race
    const leaderPts=raceLabels.map((_,i)=>Math.max(...top10.map(d=>driverPts[d.Driver?.driverId].pts[i]||0)));

    const datasets=top10.map(d=>{
      const id=d.Driver?.driverId;
      const info=driverPts[id];
      return{
        label:info.name,
        driverId:id,
        data:info.pts.map((p,i)=>+(p-leaderPts[i]).toFixed(1)),
        borderColor:info.color,
        backgroundColor:info.color+'18',
        borderWidth:2,
        pointRadius:3,
        pointHoverRadius:6,
        tension:0.3,
        fill:false
      };
    });

    const legendHtml=top10.map(d=>{
      const id=d.Driver?.driverId;
      const info=driverPts[id];
      return`<div class="gap-legend-item" id="gapl-${id}" onclick="toggleGapDriver('${id}')">
        <div class="pace-dot" style="background:${info.color}"></div>
        <span>${info.name}</span>
      </div>`;
    }).join('');

    el.innerHTML=`<div class="gap-section">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:16px">
        Points gap to the championship leader after each race. Leader = 0. Lines below = points behind.
      </div>
      <div class="gap-chart-wrap"><canvas id="champCanvas"></canvas></div>
      <div class="gap-legend" id="gapLegend">${legendHtml}</div>
    </div>`;

    if(_champChart){_champChart.destroy();_champChart=null;}
    const ctx=document.getElementById('champCanvas')?.getContext('2d');
    if(!ctx)return;

    _champChart=new Chart(ctx,{
      type:'line',
      data:{labels:raceLabels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,animation:{duration:600},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'rgba(6,6,20,.92)',borderColor:'rgba(255,255,255,.12)',borderWidth:1,
            titleFont:{family:"'Barlow Condensed',sans-serif",size:11},
            bodyFont:{family:"'Barlow Condensed',sans-serif",size:12},
            titleColor:'rgba(240,240,240,.5)',bodyColor:'#f0f0f0',padding:12,
            callbacks:{
              title:items=>items[0].label,
              label:item=>{const v=item.raw;return' '+item.dataset.label+':  '+(v===0?'LEADER':(v>0?'+':'')+v+' pts');}
            }
          }
        },
        scales:{
          x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(240,240,240,.35)',font:{family:"'Barlow Condensed',sans-serif",size:10}}},
          y:{
            grid:{color:'rgba(255,255,255,.04)'},
            ticks:{color:'rgba(240,240,240,.35)',font:{family:"'Barlow Condensed',sans-serif",size:10},callback:v=>v===0?'Leader':v+'pts'},
            title:{display:true,text:'GAP TO LEADER',color:'rgba(240,240,240,.3)',font:{family:"'Barlow Condensed',sans-serif",size:9}}
          }
        }
      }
    });
  }catch(e){
    el.innerHTML=`<div class="pace-err">Could not load championship data<br><small style="opacity:.4">${e.message}</small></div>`;
  }
}

function toggleGapDriver(id){
  if(!_champChart)return;
  const ds=_champChart.data.datasets.find(d=>d.driverId===id);
  if(!ds)return;
  ds.hidden=!ds.hidden;
  document.getElementById('gapl-'+id)?.classList.toggle('hidden',ds.hidden);
  _champChart.update('none');
}

/* ═══════════════════════════════
   RACE PACE CHART
═══════════════════════════════ */
let _paceChart = null;
let _paceDrivers = {};   // driverId -> {name, color, laps:[{lap,sec}]}
let _hiddenDrivers = new Set();
let _paceRound = null;
let _paceRaceName = '';

function lapToSec(t){
  if(!t)return null;
  const p=t.split(':');
  if(p.length===2) return parseFloat(p[0])*60+parseFloat(p[1]);
  return parseFloat(t);
}

function secToLap(s){
  if(!s&&s!==0)return'—';
  const m=Math.floor(s/60),sec=(s%60).toFixed(3).padStart(6,'0');
  return m+':'+sec;
}

async function fetchAllLaps(season, round, driverIds){
  // Strategy: one request per driver using /drivers/{id}/laps/
  // Jolpica caps limit at 100 — but each driver only has ~58 laps max per race,
  // so one request per driver is always sufficient.
  // Batches of 4, 350ms between batches, well within 4 req/s burst limit.
  const all = {};
  const BATCH = 4;
  const DELAY = 350;

  for(let i = 0; i < driverIds.length; i += BATCH){
    const batch = driverIds.slice(i, i + BATCH);
    await Promise.all(batch.map(async id => {
      try{
        // First request — also check total in case pagination needed
        const url = `${API}/${season}/${round}/drivers/${id}/laps/?format=json&limit=100&offset=0`;
        const data = await fetchJ(url);
        const total = parseInt(data?.MRData?.total || 0);
        let laps = data?.MRData?.RaceTable?.Races?.[0]?.Laps || [];

        // If more pages exist (shouldn't happen for per-driver, but handle it)
        if(total > 100){
          const pages = [];
          for(let o = 100; o < total; o += 100) pages.push(o);
          const extras = await Promise.allSettled(
            pages.map(o => fetchJ(`${API}/${season}/${round}/drivers/${id}/laps/?format=json&limit=100&offset=${o}`))
          );
          extras.forEach(r => {
            if(r.status === 'fulfilled'){
              laps = laps.concat(r.value?.MRData?.RaceTable?.Races?.[0]?.Laps || []);
            }
          });
        }

        if(!laps.length) return;
        all[id] = [];
        laps.forEach(lap => {
          const lapNum = parseInt(lap.number);
          (lap.Timings || []).forEach(t => {
            const sec = lapToSec(t.time);
            // Keep laps 55s–250s: covers all circuits, filters formation/safety car extremes
            if(sec && sec > 55 && sec < 250) all[id].push({lap: lapNum, sec});
          });
        });
      } catch(e){ /* skip on error */ }
    }));
    // Progress update on loading screen
    const pct = Math.round(Math.min(i + BATCH, driverIds.length) / driverIds.length * 100);
    const loadEl = document.querySelector('#paceContainer .loading-text');
    if(loadEl) loadEl.textContent = `Loading lap times… ${pct}%`;
    if(i + BATCH < driverIds.length) await new Promise(r => setTimeout(r, DELAY));
  }
  return all;
}

async function renderPaceChart(race){
  if(!race)return;
  const container=document.getElementById('paceContainer');
  if(!container)return;
  _paceRound=race.round;
  _paceRaceName=race.raceName||'Race';
  const label=document.getElementById('paceRaceLabel');
  if(label) label.textContent=`Round ${race.round} · ${race.Circuit?.Location?.country||''}`;

  container.innerHTML=`<div class="pace-loading"><div class="loading-ring"></div><div class="loading-text">Fetching lap times — takes ~10s…</div></div>`;

  // Build driver id -> name/color map from race results
  const results=race.Results||[];
  const driverMeta={};
  results.forEach(r=>{
    driverMeta[r.Driver?.driverId]={
      name:r.Driver?.code||fn(r.Driver).split(' ').pop(),
      fullName:fn(r.Driver),
      color:teamColor(r.Constructor?.constructorId),
      team:r.Constructor?.name||''
    };
  });

  let lapData;
  try{
    const driverIds=(race.Results||[]).map(r=>r.Driver?.driverId).filter(Boolean);
    lapData=await fetchAllLaps('current', race.round, driverIds);
  }catch(e){
    container.innerHTML=`<div class="pace-err">Could not load lap time data<br><small style="opacity:.4">${e.message}</small></div>`;
    return;
  }

  if(!lapData||!Object.keys(lapData).length){
    container.innerHTML=`<div class="pace-err">No lap time data available for this race yet</div>`;
    return;
  }

  _paceDrivers={};
  _hiddenDrivers=new Set();

  Object.entries(lapData).forEach(([driverId,laps])=>{
    if(!laps.length)return;
    const meta=driverMeta[driverId]||{name:driverId,fullName:driverId,color:'#888',team:''};
    // Filter outliers: remove laps >110% of driver's median (pit stops etc.)
    const sorted=[...laps].sort((a,b)=>a.sec-b.sec);
    const median=sorted[Math.floor(sorted.length/2)]?.sec||0;
    const clean=laps.filter(l=>l.sec<median*1.10);
    _paceDrivers[driverId]={...meta,laps:clean,allLaps:laps};
  });

  buildPaceChart(race.laps||60);
}

function buildPaceChart(totalLaps){
  const container=document.getElementById('paceContainer');
  if(!container)return;

  const dIds=Object.keys(_paceDrivers);
  if(!dIds.length){ container.innerHTML=`<div class="pace-err">No data</div>`; return; }

  // Compute stats
  const stats=dIds.map(id=>{
    const d=_paceDrivers[id];
    const clean=d.laps;
    if(!clean.length)return null;
    const avg=clean.reduce((s,l)=>s+l.sec,0)/clean.length;
    const fastest=Math.min(...clean.map(l=>l.sec));
    return{id,name:d.name,fullName:d.fullName,color:d.color,team:d.team,avg,fastest,laps:clean};
  }).filter(Boolean).sort((a,b)=>a.avg-b.avg);

  const fastest=stats[0];
  const lapRange=Array.from({length:totalLaps},(_, i)=>i+1);

  // Build legend + controls HTML
  const legendHtml=stats.map(s=>`
    <div class="pace-legend-item" id="leg-${s.id}" onclick="toggleDriver('${s.id}')">
      <div class="pace-dot" style="background:${s.color}"></div>
      <span>${s.name}</span>
    </div>`).join('');

  const statHtml=stats.slice(0,5).map((s,i)=>{
    const delta=s.avg-fastest.avg;
    return`<div class="pace-stat" style="border-color:${s.color}33">
      <div class="pace-stat-val" style="color:${s.color}">${s.name}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;margin-bottom:4px">${secToLap(s.avg)} avg</div>
      <div class="pace-stat-lbl">${i===0?'🏆 Fastest avg':'+'+delta.toFixed(3)+'s / lap'}</div>
    </div>`;
  }).join('');

  container.innerHTML=`
    <div class="pace-section">
      <div class="pace-controls">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase">Show:</span>
        <button class="pace-filter-btn on" id="pfAll" onclick="setPaceFilter('all')">All Drivers</button>
        <button class="pace-filter-btn" id="pfTop5" onclick="setPaceFilter('top5')">Top 5 Pace</button>
        <button class="pace-filter-btn" id="pfTop10" onclick="setPaceFilter('top10')">Top 10</button>
      </div>
      <div class="pace-chart-wrap"><canvas id="paceCanvas"></canvas></div>
      <div class="pace-legend" id="paceLegend">${legendHtml}</div>
    </div>
    <div class="pace-stat-grid">${statHtml}</div>`;

  // Build Chart.js datasets
  const datasets=stats.map(s=>({
    label:s.name,
    data:lapRange.map(n=>{
      const l=s.laps.find(x=>x.lap===n);
      return l?parseFloat(l.sec.toFixed(3)):null;
    }),
    borderColor:s.color,
    backgroundColor:s.color+'22',
    borderWidth:1.8,
    pointRadius:0,
    pointHoverRadius:4,
    tension:0.3,
    spanGaps:true,
    driverId:s.id
  }));

  if(_paceChart){ _paceChart.destroy(); _paceChart=null; }

  const ctx=document.getElementById('paceCanvas')?.getContext('2d');
  if(!ctx)return;

  _paceChart=new Chart(ctx,{
    type:'line',
    data:{labels:lapRange,datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:600},
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(6,6,20,.92)',
          borderColor:'rgba(255,255,255,.12)',
          borderWidth:1,
          titleFont:{family:"'Barlow Condensed',sans-serif",size:11,weight:'normal'},
          bodyFont:{family:"'Barlow Condensed',sans-serif",size:12},
          titleColor:'rgba(240,240,240,.5)',
          bodyColor:'#f0f0f0',
          padding:12,
          callbacks:{
            title:items=>'Lap '+items[0].label,
            label:item=>{
              const v=item.raw;
              if(!v&&v!==0)return null;
              return ' '+item.dataset.label+':  '+secToLap(v);
            }
          }
        }
      },
      scales:{
        x:{
          grid:{color:'rgba(255,255,255,.04)'},
          ticks:{color:'rgba(240,240,240,.35)',font:{family:"'Barlow Condensed',sans-serif",size:10},maxTicksLimit:15},
          title:{display:true,text:'LAP',color:'rgba(240,240,240,.3)',font:{family:"'Barlow Condensed',sans-serif",size:9,letterSpacing:'3px'}}
        },
        y:{
          grid:{color:'rgba(255,255,255,.04)'},
          ticks:{color:'rgba(240,240,240,.35)',font:{family:"'Barlow Condensed',sans-serif",size:10},
            callback:v=>secToLap(v)},
          title:{display:true,text:'LAP TIME',color:'rgba(240,240,240,.3)',font:{family:"'Barlow Condensed',sans-serif",size:9}}
        }
      }
    }
  });
}

function toggleDriver(id){
  if(_hiddenDrivers.has(id)){
    _hiddenDrivers.delete(id);
    document.getElementById('leg-'+id)?.classList.remove('hidden');
  }else{
    _hiddenDrivers.add(id);
    document.getElementById('leg-'+id)?.classList.add('hidden');
  }
  if(!_paceChart)return;
  _paceChart.data.datasets.forEach(ds=>{
    if(ds.driverId===id) ds.hidden=_hiddenDrivers.has(id);
  });
  _paceChart.update('none');
}

function setPaceFilter(mode){
  document.querySelectorAll('.pace-filter-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById({all:'pfAll',top5:'pfTop5',top10:'pfTop10'}[mode])?.classList.add('on');
  if(!_paceChart)return;
  const ranked=Object.entries(_paceDrivers)
    .map(([id,d])=>{const avg=d.laps.reduce((s,l)=>s+l.sec,0)/(d.laps.length||1);return{id,avg};})
    .sort((a,b)=>a.avg-b.avg)
    .map(x=>x.id);
  const limit=mode==='top5'?5:mode==='top10'?10:999;
  _paceChart.data.datasets.forEach(ds=>{
    const rank=ranked.indexOf(ds.driverId);
    ds.hidden=rank>=limit;
    const leg=document.getElementById('leg-'+ds.driverId);
    if(leg) leg.classList.toggle('hidden',rank>=limit);
  });
  _paceChart.update('none');
}

/* ═══════════════════════════════════════════════════
   ADMIN NOTICE BANNER
   Reads from Supabase `notices` table.
   Only shows if active=true and not dismissed this session.
═══════════════════════════════════════════════════ */
const NOTICE_ICONS = {info:'📢', warning:'⚠️', alert:'🚨', success:'✅'};

async function loadNotice(){
  try{
    const res = await fetch(
      `${PROXY}?path=${encodeURIComponent('/rest/v1/notices')}&select=*&active=eq.true&order=created_at.desc&limit=1`,
      { headers:{ 'Content-Type':'application/json' } }
    );
    const data = await res.json();
    const notice = Array.isArray(data) ? data[0] : null;
    if(!notice) return;

    // Don't re-show if user dismissed this exact notice this session
    const dismissed = sessionStorage.getItem('dismissed_notice');
    if(dismissed === String(notice.id)) return;

    const banner  = document.getElementById('noticeBanner');
    const icon    = document.getElementById('noticeIcon');
    const title   = document.getElementById('noticeTitle');
    const msg     = document.getElementById('noticeMsg');
    if(!banner) return;

    const type = notice.type || 'info';
    banner.className = `notice-banner type-${type} show`;
    icon.textContent = NOTICE_ICONS[type] || '📢';
    title.textContent = notice.title || '';
    msg.textContent   = notice.message || '';
  }catch(e){ /* silently fail — notice is non-critical */ }
}

function dismissNotice(){
  const banner = document.getElementById('noticeBanner');
  if(!banner) return;
  banner.style.transition = 'opacity .3s, transform .3s';
  banner.style.opacity = '0';
  banner.style.transform = 'translateY(-8px)';
  setTimeout(()=>{ banner.classList.remove('show'); }, 300);
  // Remember dismissal so it doesn't re-appear on refresh this session
  fetch(`${PROXY}?path=${encodeURIComponent('/rest/v1/notices')}&select=id&active=eq.true&order=created_at.desc&limit=1`)
    .then(r=>r.json())
    .then(d=>{ if(d[0]?.id) sessionStorage.setItem('dismissed_notice', String(d[0].id)); })
    .catch(()=>{});
}

checkPasswordResetFlow();
loadNotice();
loadAll();
setInterval(()=>loadAll(),5*60*1000);
