<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2026 · Live Season Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --red:#e10600;--gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
  --glass-bg:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.10);
  --glass-hover:rgba(255,255,255,0.07);--text:#f0f0f0;--muted:rgba(240,240,240,0.42);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:#060610;color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── BG ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg::before{content:'';position:absolute;width:900px;height:900px;background:radial-gradient(circle,rgba(225,6,0,0.16) 0%,transparent 70%);top:-200px;left:-200px;animation:drift1 18s ease-in-out infinite alternate}
.bg::after{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(30,60,200,0.13) 0%,transparent 70%);bottom:-100px;right:-100px;animation:drift2 22s ease-in-out infinite alternate}
.bg-mid{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(100,30,180,0.10) 0%,transparent 70%);top:40%;left:50%;transform:translate(-50%,-50%);animation:drift3 25s ease-in-out infinite alternate}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px);background-size:60px 60px}
@keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(120px,80px) scale(1.2)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(-100px,-60px) scale(1.15)}}
@keyframes drift3{from{transform:translate(-50%,-50%) scale(1)}to{transform:translate(-45%,-55%) scale(1.3)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes countPop{0%{transform:scale(1.25);color:#fff}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.wrapper{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:0 24px 80px}

/* ── Header ── */
header{padding:36px 0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--glass-border);margin-bottom:44px;flex-wrap:wrap;gap:16px}
.logo{display:flex;align-items:center;gap:16px}
.logo-flag{display:flex;gap:3px;align-items:center}
.logo-flag span{display:block;width:8px;height:36px;border-radius:2px}
.logo-flag span:nth-child(odd){background:#fff}.logo-flag span:nth-child(even){background:var(--red)}
.logo-text h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;line-height:1;background:linear-gradient(135deg,#fff 30%,var(--red) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-text p{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:6px;color:var(--muted);text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live-badge{display:flex;align-items:center;gap:8px;background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);padding:9px 18px;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.live-dot{width:8px;height:8px;background:#00e676;border-radius:50%;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px #00e676;flex-shrink:0}
.refresh-btn{background:rgba(225,6,0,0.12);border:1px solid rgba(225,6,0,0.3);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:9px 18px;border-radius:50px;cursor:pointer;transition:all .2s}
.refresh-btn:hover{background:rgba(225,6,0,0.22)}

/* ── Auth Button in Header ── */
.auth-btn{display:flex;align-items:center;gap:8px;background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:9px 18px;border-radius:50px;cursor:pointer;transition:all .2s;backdrop-filter:blur(20px)}
.auth-btn:hover{background:var(--glass-hover);border-color:rgba(255,255,255,.2)}
.auth-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:#fff;flex-shrink:0}

/* ── Loading / Error ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:20px}
.loading-ring{width:52px;height:52px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-family:'Barlow Condensed',sans-serif;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-size:13px}
.error-card{background:rgba(225,6,0,0.07);border:1px solid rgba(225,6,0,0.2);border-radius:16px;padding:28px;text-align:center;margin-bottom:32px}
.error-card h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:8px}
.error-card p{color:var(--muted);font-size:13px;line-height:1.6}
.error-card code{font-size:10px;opacity:.4;display:block;margin-top:8px}

/* ── Section labels ── */
.sec-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:6px;color:var(--red);text-transform:uppercase;margin-bottom:6px}
.sec-head{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;margin-bottom:24px;line-height:1}

/* ── Countdown ── */
.countdown-section{margin-bottom:48px;animation:fadeUp .5s ease both}
.countdown-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.session-tile{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-radius:18px;padding:20px 18px;position:relative;overflow:hidden;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease}
.session-tile:hover{transform:translateY(-4px);box-shadow:0 18px 48px rgba(0,0,0,.45)}
.session-tile.next-up{border-color:rgba(225,6,0,.45);background:rgba(225,6,0,.055)}
.session-tile.next-up:hover{box-shadow:0 18px 48px rgba(225,6,0,.18)}
.session-tile.completed{opacity:.38;filter:grayscale(.5)}
.session-tile.sprint-type{border-color:rgba(255,200,0,.22);background:rgba(255,200,0,.035)}
.session-tile.sprint-type.next-up{border-color:rgba(255,200,0,.5);background:rgba(255,200,0,.07)}
.session-tile.is-live{border-color:rgba(0,230,118,.5)!important;background:rgba(0,230,118,.05)!important}
.tile-accent{position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:18px 18px 0 0}
.tile-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pip{width:6px;height:6px;border-radius:50%;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
.pip-red{background:var(--red);box-shadow:0 0 6px var(--red)}.pip-gold{background:#ffd700;box-shadow:0 0 6px #ffd700}.pip-green{background:#00e676;box-shadow:0 0 6px #00e676}
.tile-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1.5px;margin-bottom:12px;line-height:1.1}
.tile-countdown{display:flex;gap:6px;align-items:flex-end}
.cd-block{text-align:center;min-width:32px}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;letter-spacing:1px;display:block;transition:color .15s}
.cd-unit{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block}
.cd-sep{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);padding-bottom:3px;opacity:.35;line-height:1}
.tile-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);margin-top:10px;letter-spacing:.5px;line-height:1.4}
.done-label{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--muted);margin-top:4px}
.live-label{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:#00e676;margin-top:4px}

/* ── Hero Race ── */
.hero-race{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:34px;margin-bottom:40px;position:relative;overflow:hidden;animation:fadeUp .5s ease both}
.hero-wm{position:absolute;right:-10px;top:-30px;font-family:'Bebas Neue',sans-serif;font-size:190px;color:rgba(255,255,255,0.02);line-height:1;pointer-events:none;letter-spacing:-8px}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:14px}
.race-loc{display:flex;align-items:center;gap:14px}
.flag-circle{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,0.07);flex-shrink:0}
.race-title h2{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1}
.race-title p{color:var(--muted);font-size:12px;letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;margin-top:4px}
.status-badge{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.3);color:#00e676;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:5px 14px;border-radius:50px;white-space:nowrap;align-self:flex-start}
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.podium-card{border-radius:14px;padding:20px 16px;position:relative;overflow:hidden;border:1px solid var(--glass-border);backdrop-filter:blur(20px);transition:transform .3s,box-shadow .3s;cursor:pointer}
.podium-card:hover{transform:translateY(-4px);box-shadow:0 18px 48px rgba(0,0,0,.4)}
.podium-card.p1{background:linear-gradient(135deg,rgba(255,215,0,.11),rgba(255,215,0,.02));border-color:rgba(255,215,0,.24)}
.podium-card.p2{background:linear-gradient(135deg,rgba(192,192,192,.09),rgba(192,192,192,.02));border-color:rgba(192,192,192,.19)}
.podium-card.p3{background:linear-gradient(135deg,rgba(205,127,50,.09),rgba(205,127,50,.02));border-color:rgba(205,127,50,.19)}
.podium-pos{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;margin-bottom:6px}
.p1 .podium-pos{color:var(--gold)}.p2 .podium-pos{color:var(--silver)}.p3 .podium-pos{color:var(--bronze)}
.podium-driver{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;margin-bottom:3px}
.podium-team{font-size:10px;color:var(--muted);letter-spacing:2px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.podium-gap{position:absolute;bottom:16px;right:16px;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted)}
.podium-trophy{position:absolute;top:12px;right:12px;font-size:22px;opacity:.4}

/* ── Tabs ── */
.tab-nav{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tab-btn{background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:9px 20px;border-radius:50px;cursor:pointer;transition:all .2s}
.tab-btn.active,.tab-btn:hover{background:rgba(225,6,0,.14);border-color:rgba(225,6,0,.35);color:var(--text)}
.tab-panel{display:none}.tab-panel.active{display:block;animation:fadeUp .3s ease both}

/* ── Glass Table ── */
.glass-table{width:100%;background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(20px);border-radius:16px;overflow:hidden;border-collapse:separate}
.glass-table thead tr{background:rgba(255,255,255,0.05)}
.glass-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:13px 18px;text-align:left;border-bottom:1px solid var(--glass-border)}
.glass-table td{padding:12px 18px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.glass-table tbody tr{transition:background .2s}
.glass-table tbody tr:hover{background:var(--glass-hover)}
.glass-table tbody tr:last-child td{border-bottom:none}
.pos-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);width:30px}
.pos-num.top3{color:var(--text)}
.driver-name-btn{background:none;border:none;color:inherit;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;cursor:pointer;text-align:left;padding:0;border-bottom:1px solid transparent;transition:border-color .2s,color .2s}
.driver-name-btn:hover{border-color:var(--red);color:#fff}
.team-tag{font-size:10px;letter-spacing:1.5px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.gap-time{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted)}
.pts-pill{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600}
.tag-dnf{background:rgba(225,6,0,.14);border:1px solid rgba(225,6,0,.3);color:var(--red);font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif}
.tag-dns{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:var(--muted);font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif}

/* ── Standings ── */
.standings-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:40px}
.standing-card{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:16px;padding:24px}
.standing-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:12px;transition:all .2s;border-radius:6px}
.standing-row:last-child{border-bottom:none}
.standing-row:hover{background:rgba(255,255,255,.03);padding-left:8px}
.s-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;width:24px;text-align:center;color:var(--muted);flex-shrink:0}
.r1{color:var(--gold)!important}.r2{color:var(--silver)!important}.r3{color:var(--bronze)!important}
.s-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600}
.s-sub{font-size:10px;color:var(--muted);letter-spacing:1px;font-weight:400;display:block}
.s-pts{font-family:'Bebas Neue',sans-serif;font-size:20px;text-align:right}
.bar-wrap{width:100%;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:3px}
.bar-fill{height:3px;border-radius:2px;transform-origin:left;animation:barGrow .8s cubic-bezier(.4,0,.2,1) both}
.tc-mercedes td:first-child,.tc-mercedes{border-left:3px solid #00d2be}
.tc-ferrari td:first-child,.tc-ferrari{border-left:3px solid #dc0000}
.tc-mclaren td:first-child,.tc-mclaren{border-left:3px solid #ff8000}
.tc-red_bull td:first-child,.tc-red_bull{border-left:3px solid #3671c6}
.tc-haas td:first-child,.tc-haas{border-left:3px solid #b6babd}
.tc-rb td:first-child,.tc-rb,.tc-racing_bulls td:first-child,.tc-racing_bulls{border-left:3px solid #6692ff}
.tc-kick_sauber td:first-child,.tc-kick_sauber,.tc-audi td:first-child,.tc-audi{border-left:3px solid #e8002d}
.tc-alpine td:first-child,.tc-alpine{border-left:3px solid #0090ff}
.tc-williams td:first-child,.tc-williams{border-left:3px solid #64c4ff}
.tc-aston_martin td:first-child,.tc-aston_martin{border-left:3px solid #358c75}
.tc-cadillac td:first-child,.tc-cadillac{border-left:3px solid #ccc}
.standing-row.tc-mercedes,.standing-row.tc-ferrari,.standing-row.tc-mclaren,
.standing-row.tc-red_bull,.standing-row.tc-haas,.standing-row.tc-rb,
.standing-row.tc-racing_bulls,.standing-row.tc-kick_sauber,.standing-row.tc-audi,
.standing-row.tc-alpine,.standing-row.tc-williams,.standing-row.tc-aston_martin,
.standing-row.tc-cadillac{padding-left:10px}

/* ── Next Race ── */
.next-race-card{background:linear-gradient(135deg,rgba(225,6,0,.08),rgba(30,60,200,.06));border:1px solid rgba(225,6,0,.2);backdrop-filter:blur(24px);border-radius:20px;padding:30px 34px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-top:40px}
.nr-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.nr-name{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1;margin-bottom:8px}
.nr-details{display:flex;gap:18px;flex-wrap:wrap}
.nr-item{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:1px}
.sprint-badge{background:linear-gradient(135deg,rgba(255,200,0,.16),rgba(255,140,0,.08));border:1px solid rgba(255,200,0,.3);color:#ffc800;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:7px 16px;border-radius:50px;white-space:nowrap}

/* ══════════════════════
   PREDICTIONS
══════════════════════ */
.pred-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-bottom:32px}
.pred-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.pred-slot{background:rgba(255,255,255,.03);border:1px solid var(--glass-border);border-radius:14px;padding:18px 14px;text-align:center;transition:all .25s}
.pred-slot:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18);transform:translateY(-2px)}
.pred-pos{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;margin-bottom:10px}
.pred-slot:nth-child(1) .pred-pos{color:var(--gold)}
.pred-slot:nth-child(2) .pred-pos{color:var(--silver)}
.pred-slot:nth-child(3) .pred-pos{color:var(--bronze)}
.pred-select{width:100%;background:rgba(6,6,16,.8);border:1px solid rgba(255,255,255,.12);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;padding:10px 12px;border-radius:8px;cursor:pointer;outline:none;transition:border-color .2s;-webkit-appearance:none}
.pred-select:focus{border-color:var(--red)}
.pred-select option{background:#0d0d20}
.pred-submit{margin-top:20px;width:100%;background:linear-gradient(135deg,rgba(225,6,0,.2),rgba(225,6,0,.1));border:1px solid rgba(225,6,0,.4);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;padding:13px;border-radius:12px;cursor:pointer;transition:all .25s}
.pred-submit:hover{background:linear-gradient(135deg,rgba(225,6,0,.35),rgba(225,6,0,.2));transform:translateY(-1px);box-shadow:0 8px 24px rgba(225,6,0,.2)}
.pred-submit:disabled{opacity:.4;cursor:not-allowed;transform:none}
.pred-locked{text-align:center;padding:20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.pred-saved-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.25);color:#00e676;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:4px 12px;border-radius:50px;margin-top:12px}
.pred-login-prompt{text-align:center;padding:24px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px}
.pred-login-prompt button{background:none;border:none;color:var(--red);cursor:pointer;font-family:inherit;font-size:inherit;letter-spacing:inherit;text-decoration:underline;text-decoration-style:dotted;margin-left:4px}

/* ══════════════════════
   COMMENTS
══════════════════════ */
.comments-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-top:32px}
.comment-form{display:flex;gap:12px;margin-bottom:24px;align-items:flex-start}
.comment-avatar-sm{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff;flex-shrink:0;margin-top:2px}
.comment-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:12px 16px;border-radius:12px;outline:none;resize:none;min-height:48px;max-height:120px;transition:border-color .2s;line-height:1.5}
.comment-input:focus{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.06)}
.comment-input::placeholder{color:var(--muted)}
.comment-send{background:rgba(225,6,0,.15);border:1px solid rgba(225,6,0,.3);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:12px 18px;border-radius:12px;cursor:pointer;transition:all .2s;white-space:nowrap;align-self:flex-end}
.comment-send:hover{background:rgba(225,6,0,.28)}
.comment-send:disabled{opacity:.35;cursor:not-allowed}
.comment-login-prompt{text-align:center;padding:20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px}
.comment-login-prompt button{background:none;border:none;color:var(--red);cursor:pointer;font-family:inherit;font-size:inherit;letter-spacing:inherit;text-decoration:underline dotted;margin-left:4px}
.comments-list{display:flex;flex-direction:column;gap:12px}
.comment-item{display:flex;gap:12px;animation:fadeIn .3s ease both}
.comment-body{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 16px}
.comment-meta{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.comment-user{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.5px}
.comment-time{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);letter-spacing:1px}
.comment-text{font-size:14px;line-height:1.55;color:rgba(240,240,240,.8)}
.comment-delete{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0;margin-left:auto;transition:color .2s;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;align-self:flex-start}
.comment-delete:hover{color:var(--red)}
.comments-empty{text-align:center;padding:28px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.comments-loading{text-align:center;padding:20px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase}

/* ══════════════════════
   AUTH MODAL
══════════════════════ */
.auth-overlay{position:fixed;inset:0;z-index:2000;background:rgba(4,4,16,.85);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s ease}
.auth-overlay.open{opacity:1;pointer-events:all}
.auth-modal{position:relative;width:100%;max-width:420px;background:rgba(10,10,26,.75);border:1px solid rgba(255,255,255,.13);border-radius:24px;padding:36px;backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);box-shadow:0 40px 100px rgba(0,0,0,.7),0 1px 0 rgba(255,255,255,.12) inset;transform:scale(.9) translateY(24px);opacity:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s ease}
.auth-overlay.open .auth-modal{transform:scale(1) translateY(0);opacity:1}
.auth-modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.auth-modal-close:hover{background:rgba(225,6,0,.2);color:#fff}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo span{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;background:linear-gradient(135deg,#fff 30%,var(--red) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-logo p{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:4px}
.auth-tabs{display:flex;gap:0;margin-bottom:26px;background:rgba(255,255,255,.04);border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:9px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-radius:8px;transition:all .2s;border:none;background:none}
.auth-tab.active{background:rgba(225,6,0,.18);color:var(--text);border:1px solid rgba(225,6,0,.3)}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.auth-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:12px 16px;border-radius:10px;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.07)}
.auth-input::placeholder{color:var(--muted)}
.auth-submit{width:100%;background:linear-gradient(135deg,rgba(225,6,0,.25),rgba(225,6,0,.15));border:1px solid rgba(225,6,0,.45);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:4px;text-transform:uppercase;padding:14px;border-radius:10px;cursor:pointer;transition:all .25s;margin-top:6px}
.auth-submit:hover{background:linear-gradient(135deg,rgba(225,6,0,.4),rgba(225,6,0,.25));box-shadow:0 8px 24px rgba(225,6,0,.25)}
.auth-submit:disabled{opacity:.4;cursor:not-allowed}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.google-btn{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:13px;border-radius:10px;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px}
.google-btn:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.22)}
.google-icon{width:18px;height:18px}
.auth-error{background:rgba(225,6,0,.1);border:1px solid rgba(225,6,0,.25);color:#ff6b6b;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;padding:10px 14px;border-radius:8px;margin-bottom:14px;display:none}
.auth-error.show{display:block}
.auth-success{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:#00e676;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;padding:10px 14px;border-radius:8px;margin-bottom:14px;display:none}
.auth-success.show{display:block}

/* ── User dropdown ── */
.user-menu{position:relative}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:rgba(10,10,26,.92);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:6px;min-width:180px;backdrop-filter:blur(40px);z-index:100;display:none;animation:slideUp .2s ease both}
.user-menu.open .user-dropdown{display:block}
.user-dropdown-item{display:block;width:100%;padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;border-radius:8px;text-align:left;transition:all .15s}
.user-dropdown-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.user-dropdown-item.danger:hover{background:rgba(225,6,0,.12);color:var(--red)}
.user-dropdown-divider{height:1px;background:rgba(255,255,255,.07);margin:4px 0}
.user-email-preview{padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Driver Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(4,4,16,.80);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .32s ease}
.modal-overlay.open{opacity:1;pointer-events:all}
.driver-card{position:relative;width:100%;max-width:520px;background:rgba(10,10,24,.68);border:1px solid rgba(255,255,255,0.13);border-radius:22px;padding:32px;backdrop-filter:blur(44px);box-shadow:0 40px 100px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.04) inset,0 1px 0 rgba(255,255,255,.12) inset;overflow:hidden;transform:scale(.88) translateY(28px);opacity:0;transition:transform .42s cubic-bezier(.34,1.56,.64,1),opacity .3s ease;transform-style:preserve-3d;will-change:transform}
.modal-overlay.open .driver-card{transform:scale(1) translateY(0);opacity:1}
.driver-card::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);transform:skewX(-15deg);transition:left .6s ease .2s;pointer-events:none}
.modal-overlay.open .driver-card::before{left:160%}
.card-shine{position:absolute;inset:0;border-radius:22px;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.07) 0%,transparent 65%);opacity:0;transition:opacity .22s;pointer-events:none}
.card-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:22px 22px 0 0}
.card-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.card-close:hover{background:rgba(225,6,0,.2);color:#fff}
.card-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:26px}
.card-num{font-family:'Bebas Neue',sans-serif;font-size:68px;line-height:.85;letter-spacing:-2px;opacity:.13;flex-shrink:0;margin-top:4px}
.card-fullname{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;line-height:1;margin-bottom:6px}
.card-meta{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.card-team-pill{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:3px 11px;border-radius:4px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05)}
.card-nat{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);letter-spacing:1px}
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:22px}
.stat-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:13px 10px;text-align:center;transition:all .2s}
.stat-box:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);transform:translateY(-2px)}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;margin-bottom:3px}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.pts-bar-section{margin-bottom:8px}
.pts-bar-head{display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.pts-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.pts-fill{height:100%;border-radius:3px;transition:width .85s cubic-bezier(.4,0,.2,1) .15s}
.spark-row{margin-top:16px}
.spark-head{display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.spark-bars{display:flex;align-items:flex-end;gap:4px;height:46px}
.spark-bar{border-radius:2px;flex-shrink:0}
.card-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:36px 0}
.card-loading-ring{width:36px;height:36px;border:2px solid rgba(255,255,255,.07);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
.card-loading-text{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}

.last-updated{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(240,240,240,.16);margin-top:40px;text-transform:uppercase}

@media(max-width:768px){
  .standings-grid{grid-template-columns:1fr}
  .podium{grid-template-columns:1fr}
  .pred-grid{grid-template-columns:1fr}
  .countdown-grid{grid-template-columns:repeat(2,1fr)}
  .hero-race,.auth-modal{padding:20px}
  .logo-text h1{font-size:28px}
  .driver-card{padding:22px}
}

/* ── Race Pace Chart ── */
.pace-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-bottom:24px}
.pace-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.pace-filter-btn{background:rgba(255,255,255,.05);border:1px solid var(--glass-border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:50px;cursor:pointer;transition:all .2s}
.pace-filter-btn.on{background:rgba(225,6,0,.15);border-color:rgba(225,6,0,.4);color:var(--text)}
.pace-filter-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.pace-chart-wrap{position:relative;width:100%;height:340px}
.pace-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.pace-legend-item{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:50px;border:1px solid transparent;transition:all .2s}
.pace-legend-item:hover{border-color:rgba(255,255,255,.12);color:var(--text)}
.pace-legend-item.hidden{opacity:.3}
.pace-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pace-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:20px}
.pace-stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 12px;text-align:center}
.pace-stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;margin-bottom:4px}
.pace-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.pace-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 0}
.pace-err{text-align:center;padding:40px 0;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
@media(max-width:768px){.pace-chart-wrap{height:240px}}

/* ── Pit Stop Timeline ── */
.pit-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-bottom:24px}
.pit-timeline{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.pit-row{display:flex;align-items:center;gap:0;position:relative}
.pit-driver-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;width:52px;flex-shrink:0;text-align:right;padding-right:10px;color:var(--text)}
.pit-track{flex:1;height:28px;position:relative;border-radius:4px;overflow:visible}
.pit-stint{position:absolute;top:4px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;color:rgba(0,0,0,.7);font-weight:600;cursor:default;transition:opacity .15s}
.pit-stint:hover{opacity:.8}
.pit-stop-marker{position:absolute;top:0;width:2px;height:28px;background:rgba(255,255,255,.25);z-index:2}
.pit-lap-axis{display:flex;margin-left:62px;margin-top:4px;font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--muted);letter-spacing:1px;position:relative}
.pit-compound-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px}
.pit-compound-item{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:var(--muted)}
.pit-compound-dot{width:12px;height:12px;border-radius:2px}
.pit-stop-badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:3px 8px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;margin-left:8px;color:var(--muted)}

/* ── Head-to-Head ── */
.h2h-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-bottom:24px}
.h2h-selectors{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:28px}
.h2h-vs{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--red);text-align:center;letter-spacing:2px}
.h2h-select{width:100%;background:rgba(6,6,16,.85);border:1px solid rgba(255,255,255,.12);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;padding:12px 14px;border-radius:12px;cursor:pointer;outline:none;transition:border-color .2s;-webkit-appearance:none}
.h2h-select:focus{border-color:rgba(255,255,255,.25)}
.h2h-compare-btn{width:100%;background:linear-gradient(135deg,rgba(225,6,0,.2),rgba(225,6,0,.1));border:1px solid rgba(225,6,0,.4);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;padding:12px;border-radius:12px;cursor:pointer;transition:all .25s;margin-top:12px;grid-column:1/-1}
.h2h-compare-btn:hover{background:linear-gradient(135deg,rgba(225,6,0,.35),rgba(225,6,0,.2));box-shadow:0 8px 24px rgba(225,6,0,.2)}
.h2h-result{margin-top:8px}
.h2h-stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.h2h-stat-row:last-child{border-bottom:none}
.h2h-val{font-family:'Bebas Neue',sans-serif;font-size:22px}
.h2h-val.win{color:var(--text)}
.h2h-val.lose{color:var(--muted);font-size:18px}
.h2h-val-r{text-align:right}
.h2h-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center}
.h2h-bar-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.h2h-bar-l{height:4px;border-radius:2px;transform-origin:right}
.h2h-bar-r{height:4px;border-radius:2px;transform-origin:left}
.h2h-driver-header{text-align:center;padding:12px 0 20px}
.h2h-driver-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px}
.h2h-driver-team{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px}
.h2h-winner-crown{font-size:14px;margin-left:6px}

/* ── Qualifying vs Race ── */
.qvr-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-bottom:24px}
.qvr-grid{display:flex;flex-direction:column;gap:6px;margin-top:16px}
.qvr-row{display:grid;grid-template-columns:28px 1fr 28px;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;transition:background .15s}
.qvr-row:hover{background:rgba(255,255,255,.04)}
.qvr-pos{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);text-align:center}
.qvr-pos.top3{color:var(--text)}
.qvr-driver-block{display:flex;align-items:center;gap:10px}
.qvr-arrow-wrap{position:relative;flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;min-width:60px}
.qvr-arrow-fill{position:absolute;top:0;height:3px;border-radius:2px;transition:width .6s ease}
.qvr-delta{font-family:'Bebas Neue',sans-serif;font-size:16px;min-width:32px;text-align:right}
.qvr-delta.gain{color:#00e676}
.qvr-delta.loss{color:var(--red)}
.qvr-delta.same{color:var(--muted)}
.qvr-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600}
.qvr-team-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.qvr-legend{display:flex;gap:20px;margin-top:16px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:var(--muted)}
.qvr-legend span{display:flex;align-items:center;gap:6px}

/* ── Championship Gap ── */
.gap-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-bottom:24px}
.gap-chart-wrap{position:relative;width:100%;height:320px}
.gap-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.gap-legend-item{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:50px;border:1px solid transparent;transition:all .2s}
.gap-legend-item:hover{border-color:rgba(255,255,255,.12);color:var(--text)}
.gap-legend-item.hidden{opacity:.3}
@media(max-width:768px){
  .h2h-selectors{grid-template-columns:1fr;}.h2h-vs{display:none}
  .qvr-arrow-wrap{min-width:30px}.gap-chart-wrap{height:220px}
}

/* ── Teammate Gaps ── */
.tg-section{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(24px);border-radius:20px;padding:28px;margin-bottom:24px}
.tg-team-block{margin-bottom:28px}
.tg-team-block:last-child{margin-bottom:0}
.tg-team-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.07)}
.tg-team-bar{width:4px;height:32px;border-radius:2px;flex-shrink:0}
.tg-team-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.tg-team-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-left:auto}
.tg-row{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:center;margin-bottom:12px}
.tg-driver{display:flex;flex-direction:column;gap:4px}
.tg-driver-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px}
.tg-driver-time{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.tg-driver-right{text-align:right}
.tg-gap-center{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 16px}
.tg-gap-pill{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;padding:4px 12px;border-radius:50px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text);white-space:nowrap}
.tg-gap-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.tg-bar-track{position:relative;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.tg-bar-l{position:absolute;right:50%;top:0;height:4px;border-radius:2px 0 0 2px;transform-origin:right}
.tg-bar-r{position:absolute;left:50%;top:0;height:4px;border-radius:0 2px 2px 0;transform-origin:left}
.tg-winner-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:50px}
.tg-section-toggle{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tg-toggle-btn{background:rgba(255,255,255,.05);border:1px solid var(--glass-border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:50px;cursor:pointer;transition:all .2s}
.tg-toggle-btn.on{background:rgba(225,6,0,.15);border-color:rgba(225,6,0,.4);color:var(--text)}
.tg-toggle-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

<script>
/* ══════════════════════════════════════════
   SUPABASE PROXY CLIENT
   Keys live in Netlify environment variables — never in this file.
   All DB calls go through /.netlify/functions/supabase-proxy
══════════════════════════════════════════ */
const PROXY = '/.netlify/functions/supabase-proxy';
const _sbReady = true; // always ready — proxy handles availability
let _user = null;
let _userToken = null; // JWT set after login, sent as x-user-token header

// Thin proxy wrapper that mimics the Supabase JS client surface
// used by this app: from().select/insert/upsert/delete, auth.*
const _sb = {
  // ── Database ─────────────────────────────────────────────────
  from(table){
    const _filters = [];
    const _opts = {};
    let _method = 'GET';
    let _body = null;
    let _single = false;
    let _order = null;
    let _limit = null;

    const buildUrl = () => {
      const path = `/rest/v1/${table}`;
      const qs = [
        ..._filters,
        _order ? `order=${_order}` : null,
        _limit ? `limit=${_limit}` : null,
      ].filter(Boolean).join('&');
      return `${PROXY}?path=${encodeURIComponent(path)}${qs?'&'+qs:''}`;
    };

    const headers = () => {
      const h = { 'Content-Type': 'application/json' };
      if(_userToken) h['x-user-token'] = _userToken;
      if(_single) h['Accept'] = 'application/vnd.pgrst.object+json';
      if(_method==='POST'&&_single) h['Prefer'] = 'return=representation';
      if(_method==='POST'&&_opts.onConflict) h['Prefer'] = `resolution=merge-duplicates,return=representation`;
      return h;
    };

    const run = async () => {
      try{
        const res = await fetch(buildUrl(), {
          method: _method,
          headers: headers(),
          body: _body ? JSON.stringify(_body) : undefined,
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : null;
        if(!res.ok) return { data: null, error: data };
        return { data: _single ? data : (Array.isArray(data)?data:[data].filter(Boolean)), error: null };
      }catch(e){
        return { data: null, error: { message: e.message } };
      }
    };

    const q = {
      select(cols='*'){ _filters.push(`select=${cols}`); return q; },
      eq(col,val){ _filters.push(`${col}=eq.${encodeURIComponent(val)}`); return q; },
      order(col,{ascending=true}={}){ _order=`${col}.${ascending?'asc':'desc'}`; return q; },
      limit(n){ _limit=n; return q; },
      maybeSingle(){ _single=true; return q; },
      single(){ _single=true; return q; },

      insert(data){
        _method='POST'; _body=data;
        return { ...q,
          select(){ _single=true; return this; },
          single(){ _single=true; return run(); },
          then(res,rej){ return run().then(res,rej); }
        };
      },

      upsert(data, opts={}){
        _method='POST'; _body=data; _opts.onConflict=opts.onConflict||true;
        return { then(res,rej){ return run().then(res,rej); } };
      },

      delete(){
        _method='DELETE';
        return { ...q, then(res,rej){ return run().then(res,rej); } };
      },

      then(res,rej){ return run().then(res,rej); }
    };
    return q;
  },

  // ── Auth ──────────────────────────────────────────────────────
  auth: {
    async signInWithPassword({email, password}){
      try{
        const res = await fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/token?grant_type=password')}`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if(data.access_token){
          _userToken = data.access_token;
          _user = data.user;
          _sb.auth._notify('SIGNED_IN', {user: data.user});
          return { error: null };
        }
        return { error: { message: data.error_description || data.msg || 'Sign in failed' } };
      }catch(e){ return { error: { message: e.message } }; }
    },

    async signUp({email, password, options={}}){
      try{
        const res = await fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/signup')}`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            email, password,
            data: options.data||{},
            gotrue_meta_security: {},
            ...(options.emailRedirectTo ? {redirectTo: options.emailRedirectTo} : {})
          })
        });
        const data = await res.json();
        // 200/201 = success regardless of body shape
        // (body varies: with email confirm ON returns {identities:[]}, OFF returns full user)
        if(res.ok && !data.error && !data.error_description){
          return { error: null };
        }
        // Actual errors come with non-2xx status or explicit error fields
        return { error: { message: data.msg || data.error_description || data.error || 'Sign up failed' } };
      }catch(e){ return { error: { message: e.message } }; }
    },

    async signInWithOAuth({provider, options={}}){
      // Fetch Supabase URL from proxy settings endpoint, then redirect
      // Use window.location.origin as redirect_to so Supabase sends user back here
      try{
        const res = await fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/settings')}`);
        const settings = await res.json();
        const supaUrl = settings._supabaseUrl;
        if(!supaUrl) throw new Error('Cannot determine Supabase URL for OAuth');
        // Build authorize URL — redirect_to must exactly match an allowed redirect URL in Supabase
        const redirectTo = window.location.origin;
        const authorizeUrl = `${supaUrl}/auth/v1/authorize?provider=${provider}&redirect_to=${encodeURIComponent(redirectTo)}`;
        window.location.href = authorizeUrl;
        return { error: null };
      }catch(e){ return { error: { message: e.message } }; }
    },

    async signOut(){
      try{
        await fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/logout')}`, {
          method: 'POST',
          headers: _userToken ? {'x-user-token': _userToken} : {}
        });
      }catch(e){}
      _userToken = null; _user = null;
      _sb.auth._notify('SIGNED_OUT', null);
    },

    _listeners: [],
    _notify(event, session){ _sb.auth._listeners.forEach(fn => fn(event, session)); },

    onAuthStateChange(fn){
      _sb.auth._listeners.push(fn);
      // Check for OAuth callback token in URL hash
      const hash = window.location.hash;
      if(hash.includes('access_token')){
        const params = new URLSearchParams(hash.replace('#',''));
        const token = params.get('access_token');
        if(token){
          _userToken = token;
          // Fetch user info
          fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/user')}`, {
            headers: {'x-user-token': token}
          }).then(r=>r.json()).then(u=>{
            _user = u;
            fn('SIGNED_IN', {user: u});
            window.history.replaceState(null,'',window.location.pathname);
          }).catch(()=>{});
        }
      }
      // Check sessionStorage for persisted token
      const saved = sessionStorage.getItem('_f1_token');
      if(saved && !_userToken){
        _userToken = saved;
        fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/user')}`, {
          headers: {'x-user-token': saved}
        }).then(r=>r.json()).then(u=>{
          if(u?.id){ _user=u; fn('SIGNED_IN',{user:u}); }
          else { sessionStorage.removeItem('_f1_token'); }
        }).catch(()=>{});
      }
      return { unsubscribe(){ _sb.auth._listeners = _sb.auth._listeners.filter(f=>f!==fn); } };
    },

    // Persist token to sessionStorage on sign-in so page refresh keeps session
    _persistToken(token){ if(token) sessionStorage.setItem('_f1_token',token); else sessionStorage.removeItem('_f1_token'); }
  },

  channel(name){ return { on(){ return this; }, subscribe(){ return this; }, unsubscribe(){} }; }
};

// Persist token on sign-in / clear on sign-out
_sb.auth._listeners.push((event, session) => {
  if(event==='SIGNED_IN') _sb.auth._persistToken(session?.user ? _userToken : null);
  if(event==='SIGNED_OUT') _sb.auth._persistToken(null);
});

/* ═══════════════════════════════
   TEAM COLORS + HELPERS
═══════════════════════════════ */
const TEAM_COLORS={mercedes:'#00d2be',ferrari:'#dc0000',mclaren:'#ff8000',red_bull:'#3671c6',haas:'#b6babd',rb:'#6692ff',racing_bulls:'#6692ff',kick_sauber:'#e8002d',audi:'#e8002d',alpine:'#0090ff',williams:'#64c4ff',aston_martin:'#358c75',cadillac:'#cccccc'};
const FLAGS={'australia':'🇦🇺','china':'🇨🇳','japan':'🇯🇵','bahrain':'🇧🇭','saudi arabia':'🇸🇦','united states':'🇺🇸','usa':'🇺🇸','italy':'🇮🇹','monaco':'🇲🇨','spain':'🇪🇸','canada':'🇨🇦','austria':'🇦🇹','great britain':'🇬🇧','uk':'🇬🇧','hungary':'🇭🇺','belgium':'🇧🇪','netherlands':'🇳🇱','singapore':'🇸🇬','mexico':'🇲🇽','brazil':'🇧🇷','azerbaijan':'🇦🇿','las vegas':'🇺🇸','abu dhabi':'🇦🇪','qatar':'🇶🇦'};
function getFlag(c){if(!c)return'🏁';const k=c.toLowerCase();for(const[n,f]of Object.entries(FLAGS))if(k.includes(n))return f;return'🏁';}
function tc(id){return'tc-'+(id||'').toLowerCase().replace(/[\s-]+/g,'_');}
function teamColor(id){const k=(id||'').toLowerCase().replace(/[\s-]+/g,'_');return TEAM_COLORS[k]||'#e10600';}
function fn(d){return d?(d.givenName+' '+d.familyName):'';}
function isFinished(s){return!s||s==='Finished'||s.startsWith('+')||s.startsWith('Lap');}
function fmtGap(r){if(parseInt(r.position)===1)return'WINNER';if(r.Time)return r.Time.time;return r.status||'—';}
function p2(n){return String(Math.max(0,n)).padStart(2,'0');}
function avatarColor(str){const h=['#e10600','#3671c6','#ff8000','#00d2be','#0090ff','#358c75','#6692ff'];let s=0;for(let i=0;i<(str||'').length;i++)s+=str.charCodeAt(i);return h[s%h.length];}
function initials(name){return(name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function relativeTime(iso){const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/60000),h=Math.floor(m/60),dd=Math.floor(h/24);if(m<1)return'just now';if(m<60)return m+'m ago';if(h<24)return h+'h ago';return dd+'d ago';}

/* ═══════════════════════════════
   2026 SCHEDULE
═══════════════════════════════ */

const S_LABELS={fp1:'Practice 1',fp2:'Practice 2',fp3:'Practice 3',sq:'Sprint Qualifying',sprint:'Sprint Race',quali:'Qualifying',race:'Race'};

function getNextRace(){
  const now=new Date();
  for(const r of SCHED){
    const raceTime=new Date(r.s.race+':00Z');
    if(raceTime>new Date(now-4*3600*1000))return r;
  }
  return SCHED[SCHED.length-1];
}

/* ═══════════════════════════════

═══════════════════════════════ */
let cdTimer=null;
const prevSecs={};

function buildCountdown(race){
  const grid=document.getElementById('countdownGrid'),heading=document.getElementById('countdownHeading');
  if(!grid)return;
  if(heading)heading.textContent=getFlag(race.country)+' '+race.name+' — Session Countdowns';
  const now=new Date();
  const order=race.sprint?['fp1','sq','sprint','quali','race']:['fp1','fp2','fp3','quali','race'];
  const tiles=order.filter(k=>race.s[k]).map(key=>{
    const dt=new Date(race.s[key]+':00Z'),diff=dt-now,past=diff<-7200000,live=diff>=-7200000&&diff<=0,isSp=key==='sq'||key==='sprint';
    return{key,label:S_LABELS[key],dt,diff,past,live,isSp};
  });
  const nextIdx=tiles.findIndex(t=>!t.past&&!t.live)!==-1?tiles.findIndex(t=>!t.past&&!t.live):tiles.findIndex(t=>t.live);
  grid.innerHTML=tiles.map((t,i)=>{
    const isNext=i===nextIdx;
    const accentColor=t.live?'#00e676':t.isSp?'#ffd700':isNext?'var(--red)':'rgba(255,255,255,0.12)';
    const cls=['session-tile',isNext&&!t.past?'next-up':'',t.past?'completed':'',t.isSp?'sprint-type':'',t.live?'is-live':''].filter(Boolean).join(' ');
    let body='';
    if(t.live)body=`<div class="live-label"><span class="pip pip-green" style="display:inline-block;margin-right:6px"></span>LIVE NOW</div>`;
    else if(t.past)body=`<div class="done-label">✓ Complete</div>`;
    else body=`<div class="tile-countdown"><div class="cd-block"><span class="cd-num" id="cn_${t.key}_d">--</span><span class="cd-unit">Days</span></div><div class="cd-sep">:</div><div class="cd-block"><span class="cd-num" id="cn_${t.key}_h">--</span><span class="cd-unit">Hrs</span></div><div class="cd-sep">:</div><div class="cd-block"><span class="cd-num" id="cn_${t.key}_m">--</span><span class="cd-unit">Min</span></div><div class="cd-sep">:</div><div class="cd-block"><span class="cd-num" id="cn_${t.key}_s">--</span><span class="cd-unit">Sec</span></div></div>`;
    return`<div class="${cls}"><div class="tile-accent" style="background:${accentColor}"></div><div class="tile-label">${isNext&&!t.past&&!t.live?`<div class="pip ${t.isSp?'pip-gold':'pip-red'}"></div>`:''} ${t.isSp?'⚡ ':''}${t.label}</div><div class="tile-name">${race.short||race.name.split(' ')[0]}</div>${body}<div class="tile-date">${t.dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}, ${t.dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})} UTC</div></div>`;
  }).join('');
  if(cdTimer)clearInterval(cdTimer);
  cdTimer=setInterval(()=>tickCD(tiles),1000);
  tickCD(tiles);
}

function tickCD(tiles){
  const now=new Date();
  tiles.forEach(t=>{
    if(t.past||t.live)return;
    const diff=t.dt-now;if(diff<=0)return;
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    const dE=document.getElementById(`cn_${t.key}_d`),hE=document.getElementById(`cn_${t.key}_h`),mE=document.getElementById(`cn_${t.key}_m`),sE=document.getElementById(`cn_${t.key}_s`);
    if(!sE)return;
    if(dE)dE.textContent=p2(d);if(hE)hE.textContent=p2(h);if(mE)mE.textContent=p2(m);
    if(prevSecs[t.key]!==s){sE.textContent=p2(s);sE.style.animation='none';void sE.offsetHeight;sE.style.animation='countPop .22s ease';prevSecs[t.key]=s;}
  });
}

const API='https://api.jolpi.ca/ergast/f1';
async function fetchJ(url){
  const ac=new AbortController(),t=setTimeout(()=>ac.abort(),9000);
  try{const r=await fetch(url,{signal:ac.signal});clearTimeout(t);if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
  catch(e){clearTimeout(t);throw e;}
}

let _driverList=[];

async function loadAll(manual=false){
  const btn=document.getElementById('refreshBtn');
  if(manual&&btn){btn.textContent='↻ …';btn.style.pointerEvents='none';}
  buildCountdown(getNextRace());
  try{
    const [lR,dR,cR]=await Promise.allSettled([
      fetchJ(`${API}/current/last/results/?format=json&limit=30`),
      fetchJ(`${API}/current/driverStandings/?format=json`),
      fetchJ(`${API}/current/constructorStandings/?format=json`)
    ]);
    const race=lR.status==='fulfilled'?lR.value?.MRData?.RaceTable?.Races?.[0]:null;
    const dSt=dR.status==='fulfilled'?dR.value?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings||[]:[];
    const cSt=cR.status==='fulfilled'?cR.value?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings||[]:[];
    _driverList=dSt.map(d=>fn(d.Driver));
    renderApp(race,dSt,cSt);
    document.getElementById('lastUpdated').textContent='Live data · updated '+new Date().toLocaleTimeString()+' · Jolpica F1 API';
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="error-card"><h3>⚠ Cannot Load Race Data</h3><p>${e.message}</p></div>`;
    document.getElementById('lastUpdated').textContent='';
  }finally{if(btn){btn.textContent='↻ Refresh';btn.style.pointerEvents='';}}
}

async function renderPredictions(round){
  if(round===undefined) round = getNextRace().r;
  const el=document.getElementById('predictionsContainer');
  if(!el)return;
  const nxt=getNextRace();
  const raceTime=new Date(nxt.s.race+':00Z');
  const locked=new Date()<raceTime?false:true;

  if(!_user){
    el.innerHTML=`<div class="pred-section"><div class="pred-login-prompt">Sign in to submit your podium prediction for the ${nxt.name}<button onclick="openAuthModal()">Sign In / Sign Up</button></div></div>`;
    await renderLeaderboard(round,el,true);
    return;
  }

  // Load existing prediction
  let existing=null;
  const {data:pred}=_sbReady ? await _sb.from('predictions').select('*').eq('user_id',_user.id).eq('round',nxt.r).maybeSingle() : {data:null};
  existing=pred;

  const drivers=_driverList.length?_driverList:['George Russell','Kimi Antonelli','Charles Leclerc','Lewis Hamilton','Lando Norris','Max Verstappen','Oscar Piastri','Carlos Sainz','Fernando Alonso'];

  const opts=drivers.map(d=>`<option value="${d}">${d}</option>`).join('');
  const sel=(pos)=>`<select class="pred-select" id="pred${pos}">${opts}</select>`;

  if(locked&&existing){
    el.innerHTML=`<div class="pred-section">
      <p class="sec-tag">${nxt.name}</p>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:16px">Your prediction is locked in — race has started!</div>
      <div class="pred-grid">
        <div class="pred-slot"><div class="pred-pos">P1</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600">${existing.p1}</div></div>
        <div class="pred-slot"><div class="pred-pos">P2</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600">${existing.p2}</div></div>
        <div class="pred-slot"><div class="pred-pos">P3</div><div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600">${existing.p3}</div></div>
      </div>
    </div>`;
  } else if(locked){
    el.innerHTML=`<div class="pred-section"><div class="pred-locked">⏱ Predictions closed — race has started</div></div>`;
  } else {
    el.innerHTML=`<div class="pred-section">
      <p class="sec-tag">${nxt.name}</p>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:4px">Pick your predicted podium before the race starts</div>
      <div class="pred-grid">
        <div class="pred-slot"><div class="pred-pos">P1</div>${sel('P1')}</div>
        <div class="pred-slot"><div class="pred-pos">P2</div>${sel('P2')}</div>
        <div class="pred-slot"><div class="pred-pos">P3</div>${sel('P3')}</div>
      </div>
      ${existing?`<div class="pred-saved-badge">✓ Prediction saved</div>`:''}
      <button class="pred-submit" id="predSubmitBtn" onclick="savePrediction(${nxt.r})">
        ${existing?'Update Prediction':'Submit Prediction'}
      </button>
    </div>`;
    if(existing){
      const s1=document.getElementById('predP1'),s2=document.getElementById('predP2'),s3=document.getElementById('predP3');
      if(s1)s1.value=existing.p1||'';
      if(s2)s2.value=existing.p2||'';
      if(s3)s3.value=existing.p3||'';
    }
  }

  await renderLeaderboard(round,el,false);
}

async function savePrediction(round){
  const btn=document.getElementById('predSubmitBtn');
  const p1=document.getElementById('predP1')?.value;
  const p2=document.getElementById('predP2')?.value;
  const p3=document.getElementById('predP3')?.value;
  if(!p1||!p2||!p3)return;
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const uname=_user.user_metadata?.display_name||_user.email?.split('@')[0]||'Fan';
  if(!_sbReady){if(btn){btn.disabled=false;btn.textContent='Supabase not set up';}return;}
  const {error}=await _sb.from('predictions').upsert({user_id:_user.id,round,p1,p2,p3,username:uname,updated_at:new Date().toISOString()},{onConflict:'user_id,round'});
  if(!error){
    if(btn){btn.textContent='✓ Saved!';setTimeout(()=>{if(btn){btn.disabled=false;btn.textContent='Update Prediction';}},1800);}
    const badge=document.querySelector('.pred-saved-badge');
    if(!badge){const b=document.createElement('div');b.className='pred-saved-badge';b.textContent='✓ Prediction saved';btn?.parentNode?.insertBefore(b,btn);}
  }else{
    if(btn){btn.disabled=false;btn.textContent='Error — try again';}
  }
}

async function renderLeaderboard(round,container,append){
  if(!_sbReady)return;
  const {data:preds}=await _sb.from('predictions').select('*').eq('round',round).order('updated_at',{ascending:false});
  if(!preds||!preds.length)return;
  const html=`<div style="margin-top:24px"><p class="sec-tag" style="margin-bottom:12px">Community Predictions · Round ${round}</p>
  <table class="glass-table"><thead><tr><th>Fan</th><th>P1</th><th>P2</th><th>P3</th></tr></thead><tbody>
  ${preds.map(p=>`<tr><td style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600">${p.username||'Fan'}</td><td class="gap-time">${p.p1}</td><td class="gap-time">${p.p2}</td><td class="gap-time">${p.p3}</td></tr>`).join('')}

let _commentsChannel=null;

async function renderComments(round){
  if(round===undefined) round = (document.querySelector('#tab-comments .sec-tag')?.textContent?.match(/\d+/)?.[0])||getNextRace().r;
  const el=document.getElementById('commentsContainer');
  if(!el)return;

  const formHtml=_user?`
    <div class="comment-form">
      <div class="comment-avatar-sm" style="background:${avatarColor(_user.email)}">${initials(_user.user_metadata?.display_name||_user.email)}</div>
      <textarea class="comment-input" id="commentInput" placeholder="Share your thoughts on the race…" rows="1"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();postComment(${round});}"></textarea>
      <button class="comment-send" onclick="postComment(${round})">Post</button>
    </div>`:
    `<div class="comment-login-prompt">Join the discussion —<button onclick="openAuthModal()">Sign in</button> to comment</div>`;

  el.innerHTML=`${formHtml}<div class="comments-list" id="commentsList"><div class="comments-loading">Loading comments…</div></div>`;

  await loadComments(round);

  // Realtime subscription
  if(_commentsChannel)_commentsChannel.unsubscribe();
  if(!_sbReady)return;
  _commentsChannel=_sb.channel('comments-'+round)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:`round=eq.${round}`},payload=>{
      prependComment(payload.new);
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'comments',filter:`round=eq.${round}`},payload=>{
      document.getElementById('comment-'+payload.old.id)?.remove();
    })
    .subscribe();
}

async function loadComments(round){
  const list=document.getElementById('commentsList');
  if(!list)return;
  if(!_sbReady){list.innerHTML='<div class="comments-empty">Add Supabase credentials to enable comments</div>';return;}
  const {data,error}=await _sb.from('comments').select('*').eq('round',round).order('created_at',{ascending:false}).limit(100);
  if(error||!data){list.innerHTML=`<div class="comments-empty">Could not load comments</div>`;return;}
  if(!data.length){list.innerHTML=`<div class="comments-empty">No comments yet — be the first!</div>`;return;}
  list.innerHTML=data.map(c=>commentHTML(c)).join('');
}

function commentHTML(c){
  const isOwn=_user&&c.user_id===_user.id;
  const uname=c.username||'Fan';
  return`<div class="comment-item" id="comment-${c.id}">
    <div class="comment-avatar-sm" style="background:${avatarColor(c.user_id||uname)};width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff;flex-shrink:0">${initials(uname)}</div>
    <div class="comment-body">
      <div class="comment-meta">
        <span class="comment-user">${uname}</span>
        <span class="comment-time">${relativeTime(c.created_at)}</span>
        ${isOwn?`<button class="comment-delete" onclick="deleteComment('${c.id}')">✕ delete</button>`:''}
      </div>
      <div class="comment-text">${escapeHtml(c.body)}</div>
    </div>
  </div>`;
}

function prependComment(c){
  const list=document.getElementById('commentsList');
  if(!list)return;
  // Skip if this comment is already shown (optimistic duplicate guard)
  if(document.getElementById('comment-'+c.id))return;
  const empty=list.querySelector('.comments-empty,.comments-loading');
  if(empty)empty.remove();
  list.insertAdjacentHTML('afterbegin',commentHTML(c));
}

async function postComment(round){
  const inp=document.getElementById('commentInput');
  if(!inp||!_user)return;
  const body=inp.value.trim();
  if(!body)return;
  const btn=inp.nextElementSibling;
  if(btn){btn.disabled=true;}
  inp.value=''; inp.style.height='auto';
  const uname=_user.user_metadata?.display_name||_user.email?.split('@')[0]||'Fan';
  if(!_sbReady){if(btn)btn.disabled=false;return;}
  // Optimistically show comment immediately — don't wait for realtime
  const tempId='temp-'+Date.now();
  const optimistic={id:tempId,user_id:_user.id,round,body,username:uname,created_at:new Date().toISOString()};
  prependComment(optimistic);
  const {data,error}=await _sb.from('comments').insert({user_id:_user.id,round,body,username:uname}).select().single();
  if(error){
    // Remove optimistic entry and restore input on failure
    document.getElementById('comment-'+tempId)?.remove();
    inp.value=body;
  } else if(data){
    // Replace temp element with real one (correct id for delete to work)
    const tempEl=document.getElementById('comment-'+tempId);
    if(tempEl) tempEl.outerHTML=commentHTML(data);
  }
  if(btn)btn.disabled=false;
}

async function deleteComment(id){
  if(!_user||!_sbReady)return;
  // Remove from DOM instantly — don't wait for realtime DELETE event
  const el=document.getElementById('comment-'+id);
  if(el){
    el.style.transition='opacity .2s, transform .2s';
    el.style.opacity='0'; el.style.transform='translateX(-8px)';
    setTimeout(()=>el.remove(), 200);
  }
  // Fire delete in background
  const {error}=await _sb.from('comments').delete().eq('id',id).eq('user_id',_user.id);
  if(error){
    // Restore if delete failed
    const list=document.getElementById('commentsList');
    if(list) await loadComments(id); // fallback reload
  }
}

function escapeHtml(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function doResetPassword(){

  if(!email){ showAuthError('Please enter your email address.'); return; }
  const btn = document.getElementById('rstBtn');
  btn.disabled=true; btn.textContent='Sending…';
  try{
    const redirectTo = window.location.origin + '?reset=1';
    const res = await fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/recover')}`, {
      method: 'POST',

    });
    // Supabase returns 200 even if email doesn't exist (security best practice)
    showAuthSuccess('Reset link sent! Check your inbox — including spam.');

// Handle password reset redirect — when user clicks link in email,
// they land back on the site with an access_token in the URL hash.
// We catch it, show a "set new password" form automatically.
function checkPasswordResetFlow(){
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#',''));
  const type = params.get('type');
  const token = params.get('access_token');

  if(type === 'recovery' && token){
    _userToken = token;
    window.history.replaceState(null,'',window.location.pathname);
    // Show the set-new-password modal
    openAuthModal();
    document.getElementById('authTabsRow').style.display='none';
    document.getElementById('authSignInForm').style.display='none';
    document.getElementById('authSignUpForm').style.display='none';
    document.getElementById('authResetForm').style.display='none';
    document.getElementById('authError').classList.remove('show');
    document.getElementById('authSuccess').classList.remove('show');
    // Inject the new password form
    const modal = document.getElementById('authModal');
    if(!document.getElementById('authNewPassForm')){
      const div = document.createElement('div');
      div.id = 'authNewPassForm';
      div.innerHTML = `
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:16px">Set New Password</div>
        <div class="auth-field"><label>New Password</label><input class="auth-input" id="newPass" type="password" placeholder="Min 6 characters" autocomplete="new-password"></div>
        <div class="auth-field"><label>Confirm Password</label><input class="auth-input" id="newPassConfirm" type="password" placeholder="Repeat password" autocomplete="new-password"></div>
        <button class="auth-submit" id="newPassBtn" onclick="doSetNewPassword()">Set New Password</button>`;
      modal.appendChild(div);
    }
  }
}

async function doSetNewPassword(){
  const pass = document.getElementById('newPass')?.value;
  const confirm = document.getElementById('newPassConfirm')?.value;
  if(!pass || pass.length < 6){ showAuthError('Password must be at least 6 characters.'); return; }
  if(pass !== confirm){ showAuthError('Passwords do not match.'); return; }
  const btn = document.getElementById('newPassBtn');
  btn.disabled=true; btn.textContent='Updating…';
  try{
    const res = await fetch(`${PROXY}?path=${encodeURIComponent('/auth/v1/user')}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json', 'x-user-token': _userToken},
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if(data.id || data.email){
      showAuthSuccess('Password updated! You are now signed in.');
      btn.textContent = '✓ Updated';
      _user = data;
      updateAuthHeader();
      setTimeout(()=>closeAuthModal(), 2000);
    } else {
      throw new Error(data.msg || 'Update failed');
    }
  }catch(e){
    showAuthError('Could not update password: ' + e.message);
    btn.disabled=false; btn.textContent='Set New Password';
  }
}

const dCard=document.getElementById('driverCard'),cShine=document.getElementById('cardShine');
function tiltCard(e){
  const rc=dCard.getBoundingClientRect();
  const dx=(e.clientX-(rc.left+rc.width/2))/(rc.width/2),dy=(e.clientY-(rc.top+rc.height/2))/(rc.height/2);
  dCard.style.transform=`scale(1) rotateX(${-dy*7}deg) rotateY(${dx*7}deg)`;
  const px=((e.clientX-rc.left)/rc.width*100).toFixed(1),py=((e.clientY-rc.top)/rc.height*100).toFixed(1);
  cShine.style.background=`radial-gradient(circle at ${px}% ${py}%,rgba(255,255,255,.10) 0%,transparent 60%)`;
  cShine.style.opacity='1';
}
function resetTilt(){dCard.style.transform='scale(1) rotateX(0deg) rotateY(0deg)';cShine.style.opacity='0';}
function openModal(){document.getElementById('driverModal').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('driverModal').classList.remove('open');document.body.style.overflow='';resetTilt();}

async function showDriverCard(driverId,driverName,constructorId,constructorName){
