# netlify.toml
# Netlify build + function configuration for F1 2026 Hub

[build]
  # The folder Netlify serves as your website
  publish = "."
  # Where your serverless functions live
  functions = "netlify/functions"

[functions]
  # Use Node.js 20 for the proxy function
  node_bundler = "esbuild"

# Redirect all /.netlify/functions/* calls to the functions directory
[[redirects]]
  from = "/.netlify/functions/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# Optional: security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
